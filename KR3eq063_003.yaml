body:
  text: 卷下腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉解經曰腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉是精藏於腎非生於腎也五臟六腑之精腎實藏而司其輸瀉輸瀉以時五臟六腑之精相續不絶所以成其坎而位乎北上交於心滿而後溢生生之道也經又曰陰之所生本在五味褚尚書澄曰精血者飲食五味之秀實也故東垣立言首重脾胃脾胃一虧生化之源絶精何由生腎氣雖強可坐而敗可怪今之治虛損者專以補腎為事是不明腎者主水之文若以精為腎所專主則何不曰腎氣盛乃能瀉而曰五臟盛乃能瀉也藕塘居士有云錢糧貯在庫中庫中不出錢糧所謂民脂民膏者是也善補腎者當於脾胃求之脾主長夏説時行長夏濕令當權即今之黴月也俗稱芒種逢壬入小暑重庚出者是也居歲之中央正脾之用事濕土主之何嘗寄旺於四季哉中藏經曰脾主四季正旺長夏此方可為定論矣然四季獨寄旺於長夏者何蓋火能生土土得火而旺也東垣氏謂君火持權不與之子以其中央旺極之日而君火占之恃父勢也火勢退而秋初矣濕土之令補而足之即今之木樨黴者是其驗也若謂四季各旺一十八日徒有其言並無確據惟以之配合七十二日以成一歲之紀則可若以之主治主時則不可也河間原病式云長夏屬土地之體也庶物隆盛之時也萬物至此無不長茂故曰長夏長字當讀上聲讀平聲者非也理亦近是並存之秋傷於濕辨東垣李氏云暑者季夏也季夏者濕土當令之候也君火持權不與之子濕土之令不行也濕土之令雖不得行必終於行故於申之分不與君火爭其權至酉之分乃得其權故發於大暑以後也此經所謂秋傷於濕之所由來也然燥氣又為秋之正令其所主時必先讓濕土之令過而後行是以遲至白露後始見蓋以六氣配四時當分六步看不得以四時拘喻嘉言解作秋傷於燥雖多演文亦非無據豫為之斷曰傷於濕者秋之始傷於燥者秋之終也又秋主陽明燥金謂秋傷於濕者濕客氣也燥主氣也經言未至而至曰病去而不去曰病濕應去而不去是以秋傷於濕也是客氣傷於主氣也春傷於風夏傷於暑冬傷於寒辭理皆順時字傷令字也獨秋傷於濕作令字傷時字讀者不疑也乘秋則肺先受之故上逆而咳肺朝百脈故發為痿蹶或曰冬寒夏暑皆天地之常彼留而不去之濕或偶一有之非常氣也豈能如寒暑之歲歲皆然豫曰內經原為病設也若一於正氣而無留邪則無病矣天地或無必留之氣人身則有留邪之病不必盡人而病也但有其留之者則為秋傷於濕也又汪赤崖讀經有言難經以右腎為命門誰不知其誤撰而趙養葵為之穿鑿喻嘉言改經文為秋傷於燥是偏執之聰明後世亦有附會其説者肝藏魂肺藏魄魂陽也肝主血而藏魂陽入於陰也魄陰也肺主氣而藏魄陰附於陽也凡入晝則魂出而用事魄乃藏於肺夜則魄出而用事魂乃藏於肝魂魄之出入若參商然問魂魄從何道出入答曰魂從目中入目合則魂藏多夢紛壇肝不藏也魄從鼻中出鼻息寧則魄藏也肝沉而肺浮難經論肝沉而肺浮有浮石沉香之諭豫以淺言出之肺屬金而反浮何也氣舉之也肝屬木而反沉何也血實之也邪之所湊其氣必虛經曰邪之所湊其氣必虛又曰風雨寒暑不得虛邪不能獨傷人兩人同時遇風則虛者病矣兩人同時遇病病與人身之元氣交戰壯者氣盛則病退怯者氣餒則病進是以仲景立法以元氣為主三陽結謂之隔三陽結謂之隔三陽手太陽小腸足太陽膀胱也結者燥也小腸膀胱主精液肺胃之液下輸腸與膀胱二腑受液則傳導易腸既結不受胃之液則其液上溢而為涎於是結者愈結溢者愈溢如之何可治三陽結而服潤劑未吐涎則可若涎湧而食不下不能潤腸反滋其液是速其斃也如欲服藥究竟以六君為是脾喜燥而惡濕胃液不行腸於何潤糞如羊矢者為三陽結治在腸大便溏而食哽治在胃傷寒小解六淫之邪自傷寒始故經言冬傷於寒春必病溫仲景推廣經言著傷寒論原始也冬傷於寒病不即發至春變為溫病至夏變為暑病此暑字作熱字讀即經言熱病者皆傷寒之類也其有冬時嚴寒感而即發者為正傷寒在太陽可用麻黃桂枝直中三陰可用真武四逆其時一陽之復甚微肅殺之氣正酷寒邪新感未變為熱非辛溫大熱之劑衝動不開故其立法如此至若寒變為熱由漸而傳及時行傳染之熱病只與傷寒比類依仲景六經傳變之方隨症加減無不取效東南風土春夏秋燥之令而患熱病者大忌辛熱不可輕投又經言人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死常讀東垣此事難知問兩感從何道入答曰傷寒一日太陽與少陰俱病太陽者腑也自背俞而入人所共知少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水臟水流濕故腎受之表裡兩感臟腑俱病欲汗之則有里欲下之則有表故死然人之體質有虛實病之所感有淺深感之深者必死感之淺者猶或可救故立兩感方以待好生之君子用之大羌活湯羌活獨活防風防己黃芩黃連蒼朮白朮細辛甘草各三錢知母川芎地黃各一兩共為粗料每服一兩水二盞煎至盞半熱飲一大盞不解再服病退則止若有餘症依仲景法隨經治之豫又聞先輩有言兩感者感而復感也老幼體弱之人皆無此病強壯者有之體弱之人一感已覺難任慎重而調治焉故熱雖甚不死強壯之人恃其氣血不肯服藥病雖未作邪實未除數日之間復感於寒後至者入前至者傳前至者傳後者隨之是以一日之間太陽與少陰俱病二日三日如之六經皆受邪水漿不入不知人六日死豫曾見病兩感者數人皆出強壯皆系六日死前輩稱此病為打好漢信然因制兩感奪命湯辨之早或有可救麻黃桂枝杏仁附子細辛甘草二日加葛根黃連泄加乾薑白朮茯苓譫言加石膏三日加柴胡黃芩囊縮而厥加吳萸東垣以表裡齊受為兩感後世以感而復感為兩感然實有此二種究竟齊受者急復感者稍緩後學宜並知之又傷寒與時疫有同處有不同處其同處在傳經其不同處傷寒有直中症時疫無直中症以時疫由於傳染而又非嚴寒之令也又直中之傷寒陰未傷急宜救陽故有真武四逆諸方熱病之傷寒爍傷陰液只宜救陰故薑附不可犯又凡病時疫傳染多起於發熱惡寒俗醫不識誤用桂枝薑附有鼻衄者有牙腫喉痛者有服藥之後煩躁不寧者有延數日而發斑者明醫視此必重用清涼倘能應藥漸解多是所誤之輕者若連進薑附繼以參耆邪得補而愈虐朋竭胃稿口燥唇焦旬日而死者甚多病家不知反歸怨於涼藥醫家若遇此等必先與病家任事之長者反復説明然後用藥又誤用桂枝薑附冬春猶可若時值夏秋流金爍石津液先虧豈堪任此所以仲景云桂枝下咽陽甚則斃又尤可怪者俗以有房室者為陰症而用薑附不思有房室者陰已先虧用薑附更竭其陰殆矣仲景之用薑附是寒邪直中之陰所謂無熱惡寒者也非房室之謂也又或問房勞而得熱病者何以治之豫曰房勞之人陰已先虧熱邪乘虛陷入與婦人熱入血室同例清熱養陰是其治法又俗言傷寒宜禁穀食尤不得食粥不知出於何典仲景方首稱桂枝湯服藥須臾啜稀粥一碗以助藥力胃氣自然充暢邪不能入汗復易出所謂汗生於穀法之至神妙者不讀仲景書何足語此又豫讀傷寒論注十餘家有析疑者有穿鑿者雖所見不同要皆以惜元氣惜津液為主元氣固當借而津液為尤甚書云火燃枯鼎雖赤而氣不升注之以水則氣自來矣求汗於血生氣於陰信哉陽常有餘陰常不足朱彥修有陽常有餘陰常不足之論云人受天地之氣以生天之陽為氣地之陰為血故氣常有餘血常不足天之陽日也常明不息陽有餘也月盈則虧朋不足也人之陰血應月故男子十六而精通女子十四而經行是有形之後猶有待於乳哺水穀以養陰氣始成而可與陽氣為配故古人必三十二十而後嫁聚可見古人之善於攝養也男子八八而精絶女子七七而經斷人身之陰只供三十年之用以此難成易虧之陰情欲無涯若之何而可以供給也其為不足也明矣養陰之説可不先講乎俞子容曰近時醫者多執前人肝常有餘腎常不足之説往往舉手便用平肝之劑聖濟經云原四時之所化始於木究十二經之所養始於肝女子受娠一月厥陰肝經養之肝乃春陽發動之始萬物生長之源故戒怒養陽使先天之氣相生於無窮所以肝主色氣和則體澤氣傷則枯稿故戒怒養肝是攝生之切要也不可泥平肝之説王安道云三焦焦字取火能腐物之義火之性自下而上三焦者始於原氣由於中脘散於膻中皆相火之自下而上也其曰上焦主納而不出下焦主出而不納其納其出皆系乎中焦之腐熟焦之為義可見矣大家論治張子和云氣一也因所觸而變為九內經有九氣不同之説東垣發脾胃之論統而為一以升降之振衣揭領之法也故直指方有橘皮一物湯治諸氣病子和云河間治五志獨得言外之意凡見喜怒悲思恐皆以平心火為主致於勞者傷於動動便屬陽驚者駭於心心便屬火亦以平心火為主今之醫者不達此旨遂有寒涼之謗丹溪云凡腹痛之脈皆見沉細寒熱之辨在緩與數不在大小痛處要分上下左右是氣是血是痰是食雖喜按亦有屬實症者故諸痛無補法丹溪言人身氣血沖和百病不生一有拂鬱諸病生焉蒼木撫芎總解諸郁郁在中焦蒼朮撫芎開其氣以升之假如食在氣上提其氣則食自降矣又云郁者結聚而不得發越也當升者不得升當降者不得降當變化者不得變化傳化失常六郁之病見矣河間原病式云凡病熱甚則鬱結而氣血不能宣通神無所用而不遂其機隨其鬱結之微甚有不用之大小焉是故目鬱則不能視色耳鬱則不能聽聲鼻鬱則不能聞香臭舌鬱則不能知味至如筋骨痿痹不能為用者皆熱甚鬱結之所致也潔古云靜而得之為中暑動而得之為中熱中暑為陰症中熱為陽症避暑於深堂大廈者名中暑陰寒所遏陽氣不得伸越大順散主之若行人農夫於中日勞役得之名曰中熱必肌膚大熱大渴引飲汗大泄元氣以動此天熱外傷肺氣蒼朮白虎湯主之所病雖有動靜之殊其為天暑一也大順飲中甘草最多乾薑杏仁肉桂次之三物皆炒用蓋溫劑也吾恐不能解暑反增內煩矣世俗不明類曰夏月陰氣在內大順散為必用之藥其誤人也甚矣夫陰氣非寒氣也蓋夏月陽氣發於外而陰氣則在內耳豈可視陰氣為寒氣而用溫熱乎陰果為寒何以夏月則飲水冰乎人之六腑為陽五臟為陰如肝腎之陰陰在內陽之守也肝腎之陰非肝腎之寒也作如此看癡人亦當喚醒又録名言諸痛為實通則不痛二語甚確凡痛必喊叫非實而何凡治病不可損胃氣胃氣一傷病皆滋長輕者重重者死矣年少婦人病久發澤者無妨血未傷也凡小兒面黃腹大發如枯草者不可服消燥藥血已傷也肥人之身以火為寶瘦人之身以濕為寶故肥人不任清涼瘦人不任溫補肝以散為補心腎以收為補脾以燥為補肺以潤為補腸胃以通為補古人有以大黃為補劑者腸胃閉結氣不行也制方之難素靈一書但言臟腑經絡受病之源見於脈象針灸而外只治之以蘭治之以雞矢醴及飲以半夏湯等語君臣之制補瀉之方大小奇偶正治反佐之法示其意而已仲景為制方之祖傷寒金匱二編因病立方神妙無匹後世名流大家窺其奧旨如潔古海藏河間朱李等公莫不師其意而推廣之門外好名之士經旨未明廣製成方以待病遂致群方雜出醫學無宗東垣局方發揮批駁殆盡東垣以往能知用古者即良醫也制方之難非後世所能及今録七方之制以為法再舉數方以為用方之門徑後之學者從此推求庶可漸通制方之義矣七方之制方有七大小緩急奇偶復是也張從正曰大方有二有君一臣二佐九之大方病邪不一不可以一二味治者宜之有分兩重而頓服之大方肝腎及下部之病道遠者宜之小方有二有君一臣二之小方病邪專一可一二味治者宜之有分兩小而頻服之小方心肺及在上之病宜之徐徐細呷是也完素曰肝腎位遠數多則其氣緩不能速達於下必大劑而數少取其迅速下行也心肺位近數少則其氣急不能升發於上必小劑而數多取其易散而上行也經曰補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其病所而中道無越其制度也王冰曰假如病在腎而心氣不足服藥宜急過之不以氣味飼心腎藥凌心心復益衰矣完素曰聖人治上不犯下治下不犯上治中上下俱不犯故曰誅伐無過者命曰大惑從正曰緩方有五有甘以緩之之方甘草飴蜜之屬是也病在胸膈取其留戀也有丸以緩之之方比之湯散其行遲慢也有品件衆多之緩方藥聚則遞相拘制不得獨騁其性也有無毒治病之緩方無毒則性純緩也有氣味俱薄之緩方氣味薄則長於治上及其至下藥力已衰矣好古曰治主宜緩緩則治其本也治客宜急急則治其標也從正曰急方有四有急病急攻之急方中風關格之病是也有湯散蕩滌之急方下咽易散而行速也有毒藥之急方毒藥能上通下瀉以奪病勢也有氣味俱厚之急方直趨於下而力不衰也奇方有二有獨用一物之奇方病在上而近者宜之有藥合陽數一三五七九之奇方宜下不宜汗是也完素曰小承氣奇之小者也大承氣抵擋湯奇之大者也因其攻下而為之也桂枝麻黃偶之小方也葛根青龍偶之大方也因其發汗而用之也偶方之制有兩味相配之偶方有古之二方並用之偶方古謂之復方皆病在下而遠者宜之有藥合陰數二四六八十之偶方宜汗不宜下是也好古曰奇之不去復以偶偶之不去復以奇故曰復復者再也王太僕以偶為復方七方之中有偶又有復豈非偶乃二方相合復乃數方相合乎千金參麥湯東垣云三伏之日為庚金受囚之日肺屬金畏火實甚暑月逢庚肺金之氣下伏於腎水之中謂之母藏子宮子隱母胎暑退而秋金得令故又能生水千金參麥湯能引肺金之氣下藏於腎金水相生制方之妙義也桂附八味丸陽根於陰古人欲補陽先補陰如盞中無油哪有光焰納桂附於六味之中是為燈燭之光真補陽之藥也真陽命火也命火在坎宮故以八味補之乾薑附子是仲景驅寒之藥非補陽也陰八味生人之秉賦不齊陰陽各有偏盛藥為補偏救弊而設六味加桂附治相火不足真陽衰憊王冰所謂益火之源以消陰翳尺脈弱者宜之桂附易知柏名陰八味治陰虛火動骨痿精枯王冰所謂壯水之主以制陽光尺脈旺者宜之豫體素多熱自少耳鳴夢泄五心常熱服知柏五十年並無寒中之患七旬後食減人瘦始停知柏尚有目赤畏明耳膿紅腫之患發時足心如烙改服八仙長壽丸體覺漸安非豫喜服苦寒體性當如是耳補偏救弊信然六味丸錢仲陽先生為幼科之祖以小兒純陽之體不任辛熱故將仲景八味減去桂附以養真陰是善於用古者後世大小通用養陰之劑遂以六味為宗然只宜於男子不利於婦人婦人陰血自有四物在也逍遙散古方逍遙散為疏肝散郁第一方木喜條達鬱則脾土受克病生於內故見寒熱往來頭旋胸脹口苦舌乾目暗耳鳴咳嗽便澀月候不調等症治宜調理肝脾當歸白芍補肝血之藥也陳皮白朮茯苓甘草補脾土之藥也其中柴胡煨薑薄荷三味最妙論云東方先生木木者生生之氣即火氣也火伏木中木鬱則火鬱火鬱則土鬱土鬱則金鬱金鬱則水鬱以一方治木鬱而諸郁皆解逍遙散是也蓋膽為甲木少陽之氣其氣柔嫩象草穿地而未伸惟得溫風一吹鬱氣始得條達柴胡煨薑薄荷之妙真化工肖物之妙有難以言語形容者婦人多郁鬱則生熱薛氏加丹皮梔子名黑逍遙亦善於用古矣滋腎丸東垣先生治王善夫小便不通漸成中滿腹堅如石腿裂出水夜不得眠不能飲食思得治法至旦不寐因記素問云無陽則陰無以生無陰則陽無以化又云膀胱者州都之官津液藏焉氣化則能出矣此病便祕是無陰則陽無以化也此因膏梁積熱損傷腎水火又逆上而為嘔噦內關外格之症悉具死在旦夕矣遂處此方大苦寒之劑黃柏知母各一兩桂一錢為引藥才入腹須臾前陰如刀刺火燒溺如瀑泉腫脹遂消此亦聖於制方者不入仲景之室何以能此玉屏風散古方治表虛自汗玉屏風散黃耆白朮防風三味黃耆補氣專固肌表白朮補脾專主肌肉防風為卒伍之職黃耆畏防風而使之衛外藥至病所亦猶補中益氣之用升柴也五苓散五苓散仲景太陽膀胱腑之下藥也太陽之邪在表則汗而發之在裡則引而竭之此仲景制方之義也後人通治濕熱泄瀉小便不利者多效遂為濕家通用之方曾世榮治小兒驚風泄瀉用五苓散以瀉丙火滲土濕云內有桂能抑肝風而扶脾土可謂善用五苓者矣地黃飲子河間云風病多因熱甚俗言風者言未而忘其本也中風而有癱瘓諸症者非謂肝木之風實甚而卒中之也亦非外中於風也良由將息失宜腎水虛衰則心火暴盛水不制火也火熱之氣怫鬱神明昏冒筋骨不用而卒倒無知也亦有因喜怒悲思恐五志過極而卒中者五志過極熱甚故也脾之脈連舌本散舌下脾臟受邪故舌強火氣炎上傳化失常故津液湧而為痰痰涎上潮稠黏難出故作聲也一以屬脾一以為胃熱謂之屬火與土不亦宜乎此地黃飲子之所由作也清燥湯東垣氏言諸痿生於肺熱只此一句便見治法大意經曰東方實西方虛瀉南方補北方此固是就生克言補瀉而大經大法不外於此東方木肝也西方金肺也南方火心也北方水腎也五行之中惟火有二陽常有餘陰常不足故經曰一水不勝二火理之必然肺金體燥而居上主氣畏火者也脾土性濕而居中主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿之病作瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關治痿之法無出於此此清燥湯之所由作也補中益氣湯東垣李氏云人以胃氣為本人受水穀之氣以生所謂清氣榮氣元氣衛氣春升之氣皆胃氣之別名也若飲食失節寒溫不適則脾胃乃傷或七情耗損元氣既脾胃氣衰而心火獨盛心火者陰火也起於下焦其繫系於心心不土令相火代之相火者元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流於腎溺火得以乘其土位故脾症始得則氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋陰火上衝則氣高喘而煩熱為頭痛為渴而脈洪脾胃之氣下流使穀氣不得升浮是春生之令不行則無陽以護其榮衛則不任風寒乃生寒熱此皆脾胃之氣不足所致也與外感風寒之症頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外為有餘有餘者瀉之傷其內為不足不足者補之內傷不足之病誤作外感而反瀉之是虛其虛也然則奈何當以辛甘溫之劑補其中而升其陽甘寒以瀉其火則愈矣經曰勞者溫之損者益之又云溫能除大熱今立治始得之症補中益氣湯黃耆十分甘草五分人參三分以上三味除濕熱煩熱之聖藥也當歸身酒洗二分橘紅白朮除胃中熱利腰臍間血陳皮導氣得諸甘藥又能益元氣升麻引胃氣上騰而復其本位便是行春令柴胡引清氣行少陽之氣上升以上各三分右八味都作一服水二盞煎至一盞去渣食遠稍熱服如傷之重者不過二服而愈若病久者權立加減法治之腹中痛加酒炒白芍炙甘草惡寒冷痛加去皮中桂惡熱喜寒而腹痛者於加白芍甘草中更加生黃芩二三分天涼時惡熱而痛芩桂並加少許如天寒腹痛去芍藥加益智仁半夏生薑以芍藥味酸而寒故也頭痛加蔓荊子痛甚加川芎腦頂痛加藁本如苦痛者加華陰細辛二分如臍下痛者加熟地黃五分其痛立止如不止者乃大寒也更加肉桂二三分內經所説少腹痛皆寒症從復報中來也經云大勝必大復從熱病中變而作也非傷寒厥陰之症也如胸中壅滯加青皮二分如風濕相搏一身盡痛加羌活防風蒼朮病去勿再服以風藥損人元氣而益其病也如大便閉加當歸梢閉結不行者煎成湯先用一口調元明粉一錢得行則止此症不宜下下之恐變凶症也如春月咳嗽加佛耳草款冬花夏月咳加五味子麥冬如病人能食而心下痞加黃連一二分不能食而心下痞勿加如脅下痛或脅下急縮俱加柴胡一倍清暑益氣湯經曰脈虛身熱得之傷暑又曰陽氣者衛外而為固也熱則氣泄今暑邪干衛故身熱自汗以黃耆甘溫補之為君人參當歸橘皮甘草甘微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根甘苦性平善解肌熱又以風勝濕也濕傷脾胃則食不消而作痞滿故加炒曲青皮辛甘微溫消食快氣腎惡燥急食辛以潤之故以黃柏苦寒借甘味瀉熱補水滋其化源以參麥五味救天暑之傷於庚金為佐名曰清暑益氣湯葛花解酲湯夫酒者大熱有毒氣味俱陽乃無形之物也若傷之只當發散汗出則愈其次莫如利小便葛花解酲湯主之蓮花青皮各三分木香五分陳皮人參茯苓豬苓以上各五分白朮神麯乾薑澤瀉以上各二分砂仁白蔻仁葛花以上各五分共為細末每服三錢白湯調下但得微汗酒病去矣枳朮丸易水張先生常戒服藥不可峻利藥才下咽施化其標皮之力便言快也所傷之物已去若更待一兩時辰藥盡化開其藥之峻利自有性情病去之後脾胃更損真氣元氣則壞促人壽命當時設下一藥枳實一兩麩炒黃色白朮二兩土炒黃色只此二味荷葉燒飯為丸以白朮甘溫補脾胃之元氣其中苦味除胃中之濕熱利腰臍間血先補脾胃之弱過於枳實克伐之藥一倍枳實味苦寒泄心下之痞悶消化胃中所傷藥入胃其所傷不能即去須待一兩時辰食才消化是先補其虛而後化其所傷則不峻利矣當此之時未悟用荷葉燒飯為丸之理老年味之始得可謂奇矣荷葉之物中央空象震卦之體震者動也人感之生足少限甲膽者風也生化萬物之根蒂也經曰履端於始序則不愆人之飲食入胃營氣上行即少陽甲膽之氣也胃氣穀氣元氣甲膽上升之氣一也荷葉之體生於水土之下出於汙泥之中挺然獨立其色青其中空象風木者也食藥感此氣之化胃氣何由不上升乎其主意用此一味為引可謂遠識深慮合於道者也更以燒飯和藥與白朮協力滋養穀氣而補胃再不致於內傷此東垣先生老年致戒之説也推而廣之胃中痰滯則有橘半枳朮食滯則有曲糵枳朮正氣虛則有人參枳朮實則有三黃枳朮此用方之妙義也所云荷葉燒飯者是以荷葉煮湯作飯用荷葉包飯煨而用之者非六一散河間六一散滑石六兩甘草一兩取天一生水地六成之之義治盛夏暑濕生熱心煩口渴小便不利等症真善於制方者保赤家加辰砂琥珀治小兒夏月暑熱生風尤為對症之藥青蒿丸近時有制青蒿丸送人者服之不效藥味雜也保嬰集古方青蒿丸青蒿節內蟲十條硃砂鉛粉各五分杵為丸粟米大一歲一丸乳汁送下云治驚風百不失一其詩云一半丹砂一半雪其功只在青蒿節任教死去也還魂服時須用生人血生人血人乳也此治心包肝膽痰熱生驚之方也青蒿節內蟲能入臟而清熱硃砂鉛粉能入心包墜痰病入心包肝膽者用之效邪未入臟不可輕投火花膏嬰童百問火花膏止小兒夜啼夜啼者臟冷也火花陰中之陽自然之妙剪下一朵辰砂一字蜜調成膏塗乳上令兒舔吸用法亦妙醫者意也此小巧之妙方也一字用量相當於銅製錢四個字中的一個字上堆放量舉卿古拜散陳無擇婦人方荊芥一味焙研為末淡酒沖服名舉卿古拜散治産後中風有神功蓋厥陰血分藥也唐韻荊字舉卿切芥字古拜切隱其名者重其事也非故疑惑後人蓋欲學者讀書知音義也因病制方因病制方者仲景之一百十三方為驅病而設也方從體制者丹溪之大補陰丸三才封髓河間之地黃飲子皆本氣自病之方也至東垣脾胄諸方兼內外而言之也有議東垣升陽方中提散藥多者東垣之意蓋藉參耆之力併力舉之也藥雖多份量輕是能以法治病者汪赤崖云逆流挽舟纖多幾板也好得東垣之心矣仲景一百十三方卷中不録者非不用也十二經傳變移步換形合成全局不可以分欲學犢全書耳河間保命集云仲景桂枝麻黃之輩在皮者汗而發之之法也葛根升麻之輩因其輕而揚之之法也承氣陷胸之輩下者引而竭之之法也瀉心十棗之輩中滿者泄之之法也瓜蒂梔豉之輩高者因而越之之法也此仲景因病制方之法也保赤諸方當以錢氏為宗五臟見症各有治法如肝臟之瀉青丸心臟之導赤散瀉心湯生犀散肺臟之瀉白散補肺阿膠散脾臟之瀉黃散益黃散腎臟之地黃丸分門立方至當不易不讀錢氏書未有能知保赤者張劉朱李臨病治方醫家習其法辨證不差用之多效惟張介賓先生盈尺之書述古者人所共曉新方八陳全以理言非臨病治驗之方是窗下所制以待病者謂之紙上談兵病家查閲調理未嘗不可醫家執而用之多不獲效非應敵之兵也醫者意也臨症要會意制方要有法法從理生意隨時變用古而不為古泥是真能用古者羅太無言以古方治今病如拆舊屋架新屋其材木非一不再經匠氏之手其可用乎喻嘉言先生云醫家當先讀無方之書後讀有方之書素靈甲乙難經無方之書也張劉朱李有方之書也學士商輅云醫者意也如對敵之將操舟之工貴乎臨機應變方固難於盡用然非方則古人之心弗傳茫如望洋如捕風必有率意失之者矣方果可以不用乎雖然方固良矣然必熟之素問以求其本熟之本草以究其用熟之診視以察其症熟之治療以通其變始於用方而終至於無俟於方夫然後醫之道成矣此論最為精切藥性解藥之有性猶人之有性無所賦也識其性然後用之不知其性而輕用鮮有不敗事者綱目分門辨類藥無巨細先釋名次辨誤次修治然後因其形色氣味之各別以合乎臟腑經絡而施之補瀉之用本經以下代有增補藥品日繁何能盡識醫家選用古方各隨風土之宜以合君臣之制凡用一藥先讀本草者知其體次究古方者知其用體用既明然後置諸囊中一有疑焉未可輕試仲景方箭無空發東垣方衆志成城如煉兵煉將各盡所長要使吾心之精神與藥之氣味兩相融洽則藥為我用自有得心應手之妙若不親嘗氣味訓練乎平日不可以為醫也為記藥性解欲學者知藥之性則知所用矣參耆之氣秉天地衝和所謂得氣之粹者為良是也其氣入胃與人之元氣相合故能相生相長以成補益之功此參耆之用也四物阿膠得天地陰成之味其味入胃與人之陰液相親故能相生相長以存其根此四物之用也有氣血兩虛而合用者有五臟偏虧各隨其所喜而加引經之味者是在臨症變通各從其類可也冬令傷寒初感病在太陽尚未傳裡麻黃桂枝兩把火往外一撑嚴寒之氣何患不解此仲景麻黃桂枝之用也寒邪入里變而為熱則有苦寒之味三黃白虎承氣等方從內而泄此仲景攻下之用也寒邪在表以辛溫之氣散之熱邪入里以苦寒之味泄之經所謂升降浮沉則順之寒熱溫涼則逆之是也良藥治病者草木之性順天之生氣也毒藥攻病者虻蟲水蛭砒石硝黃之類驅地之戾氣也病來殺我我不殺他不足以為治勢不兩立之用也醫家能施毒藥固是高手一或有差大命隨之矣膽欲大而心欲細至言哉人參解綱目注云人參本經稱人或省筆作參字以年浸漸長成根如人形故謂之人參後世因字文繁遂以參星之字代之張仲景傷寒論尚作參字從古本也或云唐本作參字非參商之參謂人參受天地之正氣而得人形與天地之氣並立為參是參字之義也綱目人參生上黨山谷及遼東二月八月上旬採根竹刀刮去皮曝乾無令見風狀如人形者有神上黨今潞州也其次用高麗者高麗地近遼東所産人參不及上黨者欲試上黨參但使二人同走一含人參一空口急走三五里其不含人參者必大喘含者氣息自如人參乃真也高麗人作人參贊云三丫五葉背陽向陰欲來求我椴樹相尋但言採取未及功用椴木甚大陰廣則多生採作甚有法其味與上黨者同其形體與上黨者小異上黨者有獅頭高麗者無獅頭也唐韓翃詩送客歸上黨有佳期別在春風裡應是人參五葉齊之句則唐時已重上黨人參矣三丫五葉其産與高麗同也古本人參重上黨力勝也至明末上黨參力漸薄入藥無功始重遼參遼參初採紅潤肥大肆中所貨一枝有重三五錢者價不過十換曾聞前輩有言誤服人參三五分有發狂者陽氣如此之旺也人參得天地正陽之氣而産於陰此即陽根干於之義其味入口先苦後甘此苦味非苦寒之苦是炎上作苦之苦先苦後甘火生土也苦作寒字解豈能後甘人參之生三丫法三才五葉應五行金井玉闌是其體先苦後甘是其味功力之大能回元氣於無何有之鄉豈區區凡草可同日語哉人參之體柔熟為上白熟次之柔者軟也非取其色之油潤也白熟者皮白而中潤並不枯硬若皮白而粗揉之枯硬者不堪用一部本草歸之形色氣味四字形色藥之體也氣味藥之用也藥之主病氣味為重人參之偽在形明者自能辨豫所辨者在氣味人參一片入口咀之先微苦而後甘愈咀越雋津液自生是人參之真味也今之獅黨無苦味入口沮之但甘淡耳此其力之所以薄也人參之偽不止於薺苨或全苦而不甘或但甘而不苦或帶辛酸之味挾利者取形似以害人豫故以味辨之高麗參其味與遼參相近述來參價貴甚有以高麗參惑人者其形色大略相似豫取嘗之全無參味是高麗參亦假也洋參皮白而中實金井玉闌但欠紅潤耳入口咀之先苦後甘頗似人參咀之久其味厚於人參湯亦濃於人參人參氣味俱薄得沖和之氣渾然自升元氣之所以生也洋參味厚而湯濃沉陰而降乏沖和之氣非金玉之君子用者詳之近歲以來遼參採取日繁生長不及市中所貨枝小而力薄略可觀者二三百換自古以來所未有也貧士無力服醫家因偽多不敢用遇一虛症聽命而已人參之用甚多其大綱有四一參耆二參麥三參附四參連臨症變通用之得當其功未可盡録也地黃本經乾地黃取生地黃百斤擇肥大者六十斤洗淨曬令微皺以四十斤洗淨木臼中搗汁投酒再搗絞取汁盡拌地黃日中曬或火干此古之乾地黃也生地黃掘取鮮者搗汁只入犀角地黃湯及小兒痘症大熱斑狂失血之症余皆用乾者熟地黃仲景八味丸始用之蒸曬九次為滋補肝腎血液之第一藥後世始與乾地黃分用婦人四物湯中所用者乾地黃也肆中製作不精凡用亦宜淡酒洗淨曬乾咀斷用地黃純陰之品火與日陽也蒸曬九次陽之極也從陽引陰從陰引陽成交泰之象其色絶黑其液盡透大有陽生陰長之義仲景八味丸用作陰中補陽之藥蓋陰之體陽之用也桂附之力依熟地之力以為功故無滅裂之患是用藥相制之法也肉桂別録云桂生桂陽南海陶宏景雲南海即是廣州陳藏器云桂林桂嶺因桂得名今之所生不離此郡從嶺以南際海盡有桂樹嵇含南方草木狀云桂生合浦交趾生必高山之巔則桂為炎方之木稟純陽之氣而生今則嶺廣以南所産之地甚多只州因桂名一語則今之所用者非假用之不差其功自在但取新而肉厚者不必定求交趾附子附子野生者近時難得本草所稱底平八角重一兩以上者則野生數年之附子今之附子雖出西川皆種而生如種芋然一歲一收哪得底平八角較之野生則力薄矣凡用須自制揀大者小便中浸三日洗淨晾乾麵裹煨令發析乘熱切片磁瓶收好用仲景傷寒論附子用作驅寒之藥八味丸附子為少陰嚮導其補自在地黃後世以附子為補誤矣附子走而不守何補之有炮薑柯韻伯傷寒注云凡治傷寒當知惜津液津液一傷病不能解炮薑為損津液之第一藥以辛溫大熱之性而更炮之以烈火胃無真寒何以堪此唇焦齒稿四肢反厥吾見多矣欲求病解得乎仲景為制方之祖傷寒金匱二書如四逆真武理中白通諸方為救急驅寒之重劑皆用乾薑無所謂炮薑者即丹溪河間東垣諸方亦未之見喻嘉言治卒中寒邪講明仲景救急回陽之法亦從古法用乾薑則炮薑為後世之制可知俗醫不察動輒輕投殺人多矣桂附之純陽天之陽也天之陽陽中必有陰桂之有油即有陰矣附子置器中久之則器潤即有陰矣乾薑雖極辛辣其中尚含生氣炮之以烈火生氣何在其有四時感冒之症多見惡寒指冷只宜生薑以溫散乾薑尚不可用況炮薑乎藥之炮炙有二脾胃藥穀芽神麯耆朮甘草之類宜炙者脾喜燥火生土借火力而為用也芥連知柏有宜酒炒者制其苦寒之過借酒力而達表也乾薑之性秉天地之陽業已溫矣何待於炮或謂止血之藥多炒黑用如荊芥蒲黃之類皆是豫曰荊芥本血分藥炒黑故能去血分之風而止血蒲黃性澀炒黑亦能止血血之為病熱則妄行炮薑豈容輕試或曰荊芥蒲黃輕浮之性炮薑力猛直達下焦去惡生新能引血藥至氣分而生血子何訾之深也豫曰大劑四物少加熟附佐之未嘗不可若必藉炮薑止血吾恐其逼血妄行血海為之竭矣此係有關生命之藥故諄諄及之薑以川産者力勝故書稱蜀薑取色淡黃者為上肉黑者不中用白附子白附子陽明風藥大熱純陽與附子相類而色白故名古方牽正散用之除面癱陶宏景雲此藥久絶無復真者今之白附體圓臍正非附生可知亦鬼臼由撥之類耳用為面藥不見其害湯丸中不用為是牽正散豫以石菖蒲代之款冬花本草備要一書由博返約歸於正宗為醫家便讀之書其中可儀者唯款冬花一味隨諸家雜演成文似非訒庵手筆既曰辛溫純陽則偏勝之藥也又曰瀉熱潤肺消痰除煩豈有辛溫純陽之性而能瀉熱除煩乎至若定驚明目一句尤屬支離無從著落藥為補偏救弊而設斷無寒熱虛實皆可施用之理豫故急為指出用者詳之款冬花開於隆冬感一陽之氣而生蕊小色紅氣微辛能溫肺散寒治肺寒咳嗽之藥也肺熱咳嗽者忌用東垣用佛耳草氣熱味酸亦治寒嗽之藥故用款冬為之使大黃大黃大苦大寒氣味俱厚沉陰而降之藥積瘀生熱及癥瘕積聚痞滿堅實之症閉結不通用以蕩滌腸胃推陳致新如定禍亂以致太平所以有將軍之號古言用藥如用兵者此也凡救急之藥病不急者不用病急須用其全力畏首畏尾醫之下也仲景三承氣太陽經酒浸陽明經酒洗余不用酒東垣謂其下行最速若邪熱在上非酒不至必用酒浸引至至高之分驅熱而下如物在高巔必射以取之也若用生者則遺至高之邪病後或目疾或喉痹或頭腫或膈上熱痰生也此之謂節制之兵若近世之九製大黃猛利之性全消攻堅破積不及凡品徒有將軍之名而無其實大黃之不幸也試思以霸王之勇而縛其手足輿至陳前可能卻敵否上工治病力在驅邪攻堅破敵如救焚拯溺刻不容緩故仲景為醫之聖調補之方中工能講之或謂如子所言則九製大黃竟成無用之物矣豫曰亦有可用之處如大腸血燥閉結不行配當歸枳殼麻仁為潤腸之劑亦對症之藥也此外無合用者豫前集有九制膽星亦成無用之物而有肝膽蘊熱發為癲狂之症用為引經竟與此同九制之藥大概利於補不利於攻地黃首烏為滋補良藥故宜於蒸曬愈蒸則其液愈透其味愈厚守而不走其力乃純大黃之用氣味俱厚走而不守氣先至而味隨之九蒸則氣散氣散則所存者渣滓耳故無用也陳皮豫師常論藥性云藥先入胃必胃和而後藥力行陳皮一味能補能散可升可降藥之取效陳皮之力居先須備廣産二三年者為上新者氣烈半夏亦然豫遵其説至老不易厚朴豫每炒厚朴而畏其氣之辛烈一室之中逾時乃散謂子弟曰此非良藥也本草苦溫能散實滿胃中壅閉不行可稍稍用之胃無壅閉而輕用則元氣受之矣爾輩宜知之平胃散用之者佐蒼朮而為消承氣湯用之者佐大黃而為下承氣湯仲景之利劑也大黃芒硝之猛厚朴佐之從胃中推蕩而下將軍之功尚賴其脅則厚朴亦將軍也不逢大敵將軍可輕動乎天麻天麻苗名赤箭一莖直上有風不動無風反搖故又名定風草歲生十二子閏歲生十三子其莖中空子從中落名還筒子有還源之妙返本歸根之意不獨能治風亦補肝腎之藥也血虛生風者宜之婦人肝熱生風頭旋眼黑者四物湯中加用多效用治小兒驚掣用之淺者也桑寄生草木生乎土皆以土為母寄生生於桑則以桑為母矣桑乃箕星之精故能治風寄生得桑之全力其功倍於桑枝能利關節堅筋骨關節利則風去風去則血脈通而筋骨堅矣但苦難得真者故世俗以桑枝代之龍骨綱目龍背八十一鱗具九丸之數陽之極也骨為陽中之陰龍潛則骨長骨長則身重故老龍脫骨則體輕陸佃埤雅云蛇易皮龍易骨麋鹿易角蟹易螯則龍骨是所脫之生骨非死龍之骨也書言晉地川穀及泰山岩穴中甚多齒為骨之餘骨脫則齒亦脫矣蛇易之皮鹿解之角山人多拾之龍骨之拾亦由是也骨為陽中之陰以潛而長性澀舔之黏舌故能斂浮越之正氣十劑曰澀可止脫龍骨牡蠣之屬是也牡蠣生於水而無雌為陰中之陽故二物每相須用土土為萬物之母坤之體脾之用也用時宜旋取純黃色含生氣者為上陳土一物皆自壞牆坼灶中出其土和過石灰不堪收用吾鄉土色純黃者多每於長夏土旺之月掘取純黃無雜色者一石米湯和杵捻成彈丸烈日中曬收所費二三十文可支數年之用豫常備置囊中黑壤之地一時難覓者以數丸贈之鹽天一生水水曰潤下潤下作咸人之精血味皆咸鹽為先天之味故淡食則人乏小兒麻痘忌之者麻痘之出以血運行咸能凝血故也病水腫人忌之者能助水氣為患也薑棗薑棗所以和營衛薑能宣通陽氣棗能致津液二味並行無汗能發有汗能止古方多用之大棗北棗也沉重味厚長於補脾和營衛之功小棗為上小棗入水輕浮合之生薑辛甘升陽能至病所豫邇來所用皆小紅棗也辰砂琥珀琥珀木體沖服則浮辰砂石質沖服則沉雖鎮心安魂之藥若加一二分於煎劑不能入胃用之何益凡用此者必先為末置器中以熟蜜一二匙調勻然後以湯沖服止血方中有用棕灰發灰者亦宜先用蜜調不爾則泛飯膏近有吊米露之法病不能食以之代飯豫見飲米露者數人病加而谷絶米露之性一團火氣上升而出與燒酒同雖無曲糵其理一也莫若以熟米作飯飯成再入砂鍋煮爛夏布絞出飯汁潔白如膏濃厚和軟不難吞咽沖和之性與粥飯同勝於米露多矣甘草葉時可先生一日觀釣魚而悟甘草之用謂豫曰魚竿在手所用者絲與釣也投竿於水絲屬木而性浮釣屬金而性沉腰間必系一泛留於水面能使浮者不浮沉者不沉釣者之心視為準則是釣魚無需於泛子非泛子竟不能得魚藥中之甘草極似之以其味長於甘而守中也古稱甘草能和百藥藥留於胃則從容分布升者循經降者入腑非甘草所治之病而藥之得力皆賴其停頓之功無用之用大已哉節録名言醫者當識醫家應讀之書甚繁素問靈樞訒庵先生輯成類纂本草亦成備要可謂便讀之書矣岐黃教人治病必先歲氣毋伐天和故詳言乎氣運南華有言寇莫大於陰陽無所逃於天地之間人在氣交之中與萬物同體不由生人生物之顯然可見者而尋繹之則陰陽之患渺不可得故於醫經而外採録名言作岐黃之羽翼為仲景之津梁理達人情語皆實録一木之葉一蟲之臂莫非天之所生地之所成中含太極外應五行運隨時轉道與日新識其道者可以治病可以保身不知其道茫茫四顧恍若迷津欲傳薪於後學宜遠汲乎古人李時珍曰天造地化而草木生焉剛交於柔而成根菱柔交於剛而成枝幹葉萼屬陽花實屬陰得氣之粹者為良得氣之戾者為毒故有五形焉五氣焉五色焉五味焉五性焉五用焉炎帝嘗而辨之軒岐述而著之此綱目之小序也草木之交無人指出綱目之所以稱大成也劉完素曰藥之用必本於氣味寒熱溫涼氣生於天酸苦辛鹹甘淡味成於地是以有形為味無形為氣氣為陽味為陰陽氣出上竅陰味出下竅氣化則精生味化則形長故地産養形形不足者溫之以氣陽生則陰長天産養精精不足者補之以味陽根於陰故有七方十劑以盡藥之用此太古先師設繩墨而取曲直叔世方士出規矩以為方圓夫物各有性制而用之變而通之其功用豈有窮哉天以陰陽五行化主萬物周流不息之謂行陰陽者五行之父母也草木之生根荄為奇甲坼為偶合抱之木皆從偶中出經曰天地氣交萬物華實易曰天地不交則萬物不生也李時珍梅杏桃李花皆五出其中有六出者實必雙仁奇偶之相應也如此凡諸果實中含生意故稱仁仁皆顧祖故根本不可失水潛故蘊為五精火飛故建為五臭木茂故華為五色金堅故實為五聲土和故滋為五味關尹子升者為火降者為水欲升而能升者為木欲降而不能降者為金惟土能始終之五行所以相害者天地之性衆勝寡故水勝火精勝堅故火勝金剛勝柔故金勝木專勝散故木勝土實勝虛故土勝水也白虎通木與木相摩則燃金與火相守則流月固不勝火於是乎有僓然而道盡月金魄水所生也不能勝火僓音頽衰敝之貌其道盡因以地水救之莊子夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣日之行也不見其移騏驥倍而馳草木為之摩陽燧未轉而日在其前故天之且風也草木未動而鳥已翔矣其且雨也陰曀未集而魚已潛矣以陰陽之氣相感動也故寒暑燥濕以類相從聲響疾徐以音相應也淮南子陽燧在掌而太陽火方珠運握而少陰水抱薪救火燥者先燃平地注水濕者先濡月令二分之日日夜分則同度量鈞衡石角鬥甬正權概二至之日陰陽爭死生分驗氣至於前三日垂土炭于衡兩端輕重均陰氣至則土重陽氣至則炭重天文志以鐵易土月令冬至麋角解夏至鹿角解本草夏枯草冬至生夏至枯陰陽迭變毫釐不爽書稱桐葉知閏黃楊厄閏月令廣義云草木皆知閏不獨桐葉也棕木歲長一節棕毛十二片閏歲得十三片鳳尾草左右十二翎歲閏得十三翎芋生十二子閏歲益一子藕生應月月長一節遇閏則益一節草木之受氣如此升降浮沉物之性也曾子云擊舟水中鳥聞之而高翔魚聞之而深潛易言本乎天者親上本乎地者親下則各從其類也子夏問於孔子曰商聞易之生人及萬物鳥獸昆蟲各有奇偶氣分不齊而凡人莫知其情唯達德者能原其本焉天一地二人三三為九九九八十一一主日日數十故人十月而生八九七十二偶以從奇奇主辰辰為月月主馬故馬十二月而生七九六十三三主鬥鬥主狗故狗三月而生六九五十四四主時時主豕故豕四月而生五九四十五五為音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八生風風主蟲故蟲八月而生其餘各從其類矣鳥魚生於陰而屬於陽故皆卵生魚遊於水鳥遊於云故立冬則燕雀入水化為蛤蠶食而不飲蟬飲而不食蜉蝣不飲不食萬物之所以不同介鱗夏食而冬蟄齕舌者八竅而卵生蛆嚼者九竅而胎生四足者無羽翼戴角者無上齒無角無齒者膏無角無後齒者脂晝生者類父夜生者類母是以至陰主牝至陽主牡敢問其然乎孔子曰然吾昔聞老聃亦如汝之言子夏曰商聞山書曰地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡溪谷為牝蚌蛤龜珠與月為盈虛是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美耗土之人醜食水者善遊而耐寒食土者無心而不息食木者多力而不治食草者善走而愚食桑者有緒而蛾食肉者勇毅而悍食氣者神明而壽食谷者知慧而巧不食者不死而神故曰羽蟲三百六十而鳳為之長毛蟲三百六十而麟為之長甲蟲三百六十而龜為之長鱗蟲三百六十而龍為之長倮蟲三百六十而人為之長乾坤之美也殊形異類之數王者動必以道動靜必以道靜必順理以奉天地之性而不害其所主謂之仁聖焉子夏言終而出子貢進曰商之論也何如孔子曰汝何謂也對曰微則微矣然非治世之待也孔子曰然各其所能家語東方有比目魚不比不行其名謂之鰈南方有比翼鳥不比不飛其名謂之鶼鶼西方有比肩獸與邛邛岠虛比為邛邛岠虛吃甘草即有難邛邛岠虛負之而走其名謂之蟨北方有比肩民焉迭食而迭望中有枳首蛇焉此四方中國之異氣也爾雅雷公炮炙論序摘言鮭魚插樹立便乾枯用狗膽塗卻當榮盛無名止楚無名異石藥也楚痛也截指而似去甲毛截去指頭敷之如去甲毛不覺其痛聖石開盲明目而如雲離日鐵遇神砂如泥似粉石經鶴糞化作塵飛斷絃折劍遇鸞血而如初以鸞血作膠塗折處鐵永不斷海竭江枯投遊波而立泛遊波燕也令鉛拒火須仗修天今呼為補天石如要形堅豈忘紫背紫背天葵草名長齒生牙賴雄鼠之骨末齒折不生者取雄鼠脊作末揩折處齒自生發眉墮落塗半夏而立生以生半夏莖杵取涎塗之橘踰淮化為枳周禮貉踰汶則死考工記是囿於地氣也鳥生於林其羽象葉獸生於山其毛象草魚生於水其鱗象紋此地氣之承天也李時珍羊無瞳而視蛇無足而行魚無耳而聽蟬無口而鳴菟絲無根依木而生水母無目以蝦為目天之所以庇其不全也象膽遊行於四足獺肝月分一葉龍蛇之蟄蟲鳥之鳴隨一歲之氣運也莢朔生望落月季花月開一度隨一月之氣運也山鳥朝嘲水鳥夜咬貓睛十二時變隨一日之氣運也雄鳴上風雌鳴下風雄翼掩右雌翼掩左此一定之天也禽經葵花向日菱花向月鷓鶘南飛柏葉西指是天性之不可奪者蜒蚰食蝍蛆蝍蛆食蛇蛇食蜒蚰三物相逢至死不動物之相畏有如此者人有忌漆者見漆而發瘡腫曾患疔瘡見麻勃而立死食萆麻者一生不得食炒豆犯之則脹死物之相忌有如此者綱目注磁石引針琥珀拾芥氣相感也磁石不能取憊鐵一説磁石不受曲針琥珀不能吸腐芥物之腐敗生氣絶矣故不受化書腥膻委地群蟻自來不待招也冰盤在室蒼蠅自去不待驅也食梅津生食芥淚墮此液之自外奪者也悲則涕生愧則汗發此液之自內致者也鹿門子人之瞳子黑故晝見夜不見陰與陰合也梟獺之瞳子赤故夜見晝不見陽與陽合也虎豹貓犬驢馬之瞳子黃故晝夜皆見眉公祕笈男子稟天之陽陽氣聚於面男子面重故溺死者俯女子稟天之陰陰氣聚於臀女子臀重故溺死者仰褚尚書澄男子三十而娶女子二十而嫁陽數奇陰數偶男長女幼者陽舒陰促勇三十筋骨堅強任為人父女二十肌膚充盛任為人母合五十應大衍之數生萬物也白虎通續刻落成喜而占此醫是儒家事儒家未肯兼變齏成我志種杏為誰甜識以經多廣心緣戒慎嚴此肱間不住筠管暇時拈保赤當恆産朝斯夕在斯不慚為道小但恐濟人遲有驗皆留簡無稽匪我思杜陵曾有句得失寸心知針艾粗知穴生疏業不加豫少過姑蘇虎丘謁前輩尤松年先生留三月師其針艾未卒業而歸一心師尹聖湯液作生涯伊尹不事針灸著本草湯液草木多殊性君臣習大家寄言諸後起毋使用時差望色知生死良工早見幾但求無鬼責何暇計人非潔己名能保貪功罪有歸順時調氣運心理莫相違著書難閉戶創稿每焚膏好辨非得已年衰敢告勞情懷優耿耿歲月水滔滔收拾餘生事都歸這一遭
