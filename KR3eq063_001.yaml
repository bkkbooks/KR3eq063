body:
  text: 卷上風痰風痰一症乳兒最多四時皆有大概冬春之交宜溫散荊防甘桔橘半生薑杏仁蘇子之類夏令宜清散杏仁牛蒡梔子之類秋令宜清潤枳殼瓜蔞之類冬令嚴寒有用麻黃湯而解者肺為嬌嫩之臟總宜疏解不得妄投丸散肺雖喜潤胃中濕痰宜燥小兒乳膩生痰外症有鼻水多涕淚二陳為治痰總劑合之前胡桔梗荊防蘇子枳殼麥芽杏仁之類或加生薑蔥白結者散之保赤之善也肺喜潤潤之中亦有分辨如杏仁蘇子溫而潤者也宜於冬春杏仁牛蒡散而潤者也宜於夏杏仁瓜蔞則清而潤者矣宜於秋燥能知此等界限則用藥不雜瓜蔞一味能發嘔易滑泄乳兒無用瓜蔞之理穀食之兒燥火傷肺嗽久不止乃可用之半夏毒輕薑汁製而陳者性平故可入君子湯南星毒烈實非良藥制以牛膽之苦寒病久膠結或可少投時行感冒無可用之理竹瀝薑汁之潤下海石之咸能軟堅尤非風痰可輕試者書云蠶與馬並屬午火在卦為離主心又云蠶食而不飲性燥得濕則腐得風則僵故能宣風化痰辛溫之藥也風寒閉結者宜之痰熱結聚非所宜也肺為貯痰之器只有開提一法為解化之用世俗之化痰丸徒傷胃氣耳至若王隱君之礞石滾痰丸為治頑痰怪症而設於小兒有何干涉風痰乳滯小兒輕病不從疏解而事丸散殺兒實多目睹心傷為之苦口驚風發搐辛亥首春嬰幼多驚風之患此天行之病氣候使然經曰己亥之歲上見厥陰厥陰司天其化為風小兒純陽之體冬月伏陽在內生痰生熱乘春氣而病發驚風作矣醫家視其色脈察其虛實當為之清痰熱平肝風則風熄而熱平粗工昧此但持通套之方豫見用荊防柴葛者病不除而加甚用羌活者一服而驚厥不回因制對症之方取效甚多示以為法連翹赤芍炒山梔天麻鉤藤橘紅半夏代赭石茯苓甘草加燈心金器同煎肝以散為補荊防柴葛皆疏散肝風之藥肝家有鬱熱宜用以疏達肝木病逢春旺若再達之是助紂為虐矣故一概疏肝之品皆叱不用連翹赤芍山梔燈心瀉心肝之蘊熱所謂實則瀉其子也天麻鉤藤所以平肝代赭金器所以鎮肝肝木既平驚風自熄再加二陳以開痰結而保脾土蓋風木旺則脾土自虧瀉其太過補其不及藥雖平淡無奇而功用切當未可移置他時者醫貴變通必先歲氣舉此可為法也淩氏子患驚風大便下青黃沫日五六次本方加白朮車前冬瓜仁去燈心二劑愈仰氏子驚作日夜十餘次加辰砂琥珀二分二劑愈畢氏子搖頭目竄戰栗不寧加菊花桑寄生二劑愈茶園孫氏子手足反張面青咬牙加羚羊角川芎二劑平去燈心山梔再加當歸白芍二劑愈王氏子食入即嘔除梔子燈心赤芍加白朮藿香二劑愈此皆春二三月病也風木之旺冬至後甲子日為始經曰巳亥之歲上見厥陰厥陰司天其化為風風令最早小兒得春氣之先風勝則動其病為搐歲氣之病各有所主此專言已亥之歲如子午之歲上見少陰少陰司天其化為火火則旺於夏錢氏瀉心導赤為對症之方丑未之歲上見太陰太陰司天其化為濕民病吐瀉風痙胃風胃苓羌活勝濕之類甚則加黃連又為對症之藥也春杪夏初多見發熱不退之症治之屢驗因記之小兒純陽之體四月為純陽之月若乾之上九六陽皆現小兒時感多有發熱不退之病幼科用藥無非發散消食甚致亂投丸散胃氣為藥所傷病不能去食減人困纍成慢驚者有之凡病已得汗表既開而熱不退二便皆利里無阻滯而熱又不退再發什麼表消什麼食豫遵錢氏訣制救陰煎從時令上用藥經所謂必先歲氣毋伐天和者是也八九月秋燥亦宜之生地丹皮麥冬陳皮茯苓甘草此方止六味而歸重救陰外見有風症再加柴胡防風驚惕加鉤藤勾嗽加桔梗杏仁有痰或嘔加半夏蘇子吐乳加麥芽泄加神麯澤瀉大便不出加梨汁小便不利加山梔木通唇紅舌瘡加連翹山梔貝母午後夜間熱甚加青蒿地骨皮論暑月吐瀉初起須用黃連香薷飲長夏暑濕當令脾土受病暴感時行之氣多有發熱吐瀉者吐瀉里症也發熱汗出表症也口渴心煩表裡俱病黃連香薷飲為對症之藥一服可平再服可愈庸俗不明此理例用疏散消食通套之方藥病不合徒傷正氣吐瀉不止精神已困額熱指冷目陷神脫雖名暑風實與慢驚同類病家恐駭每每更醫醫有見其額熱口渴暑症猶在而用黃連者有見其發熱指冷表症猶在而用香薷者不知吐瀉大作胃氣暴傷故目眶陷而四肢冷暑邪內陷故內熱口渴心煩其治法與初病不同初病正氣未傷可服黃連香薷飲故一服而效及待胃氣既傷而始用是用於不可用之時也一見目眶陷四肢冷長蟲出雖有額熱口渴心煩等症總以六君扶正為主體素實者少加炒黃連於劑內若囪門陷面㿠白體素虛者雖有熱症六君子只加扁豆花黃土水甘寒之品以清脾胃之暑一切金石等丸屏棄不用庶凡十救二三若湯丸亂投十不救一矣長夏秋初小兒患此者歲歲皆然豫前有參連飲之論又有黃土稻花湯之論皆屬後起之功點破機關莫若黃連香薷飲劈頭一服之為愈也新定黃連香薷飲香薷黃連厚朴麥芽生扁豆木瓜陳皮半夏茯苓甘草分兩量兒大小暑傷脾胃解暑為急故用香薷從外一升黃連從里一降藥之擔力二味為主劑之偶者也厚朴麥芽以平胃氣扁豆木瓜以和脾氣二陳和胃以行痰水暑濕傷脾之症何患不除臨症雖有加減亦宜斟酌不可輕易變亂萬萬未至盛暑黴月濕甚多有風濕挾食之症發熱吐瀉又宜香砂平胃藿香正氣等方黃連香藿是暑熱之藥風濕非所宜也暑邪初感病氣方盛雖體質素虛亦宜劈頭一服蓋清急於補也病經多日目陷肢冷雖有熱症未除亦宜六君扶正蓋補重於清也四肢冷不得用黃連瀉痢皆然尤當視唇舌唇舌緋紅乾渴四肢雖冷亦有用黃連者是用黃連又當以唇舌為準壯熱煩渴葉瀉初作黃連生用吐甚者薑汁炒瀉甚陳土炒皆有分辨單吐而不瀉者最惡宜加代赭以鎮逆瀉而不吐無熱症六君不能止者錢氏益黃散是為對症之藥凡止瀉丸散優於湯劑宜備用加減錢氏益黃散青皮醋拌炒三錢白朮土炒五錢木香麵裹煨三錢訶子肉同上四錢炙甘草三錢共為細末磁瓶收好或用六君調下或炒米水調下甲辰秋時痢甚計其所見覆論症記之河間云下痢紅白俗謂赤熱白寒者非通作濕熱處治又云寒則不能消穀何由反化為膿也又云俗言寒熱相兼其説尤誤寒熱異氣豈能俱甚於腸胃而同為病乎通作濕熱處治此定論也問下痢之本必由夏傷於暑常見時氣傳染感而病作何也豫曰是人腸胃中本有伏暑兼有停滯時氣相引則病作我無伏暑何患時氣問下痢膿垢白如豕膏此何物也豫曰是腸胃中之脂膏也俗名刮腸痢熱逼腸胃如刀刮而下也腸胃脂膏以厚為貴刮則腹痛腹痛則作勢而所下無多非糟粕是脂膏也刮多則腸薄潔古云宜黃連厚腸胃而止痢玩厚字之義自知刮腸之病也問河間言通作濕熱處治古名家治案亦有用薑附而愈者何也豫曰此傷於瓜果生冷或食燒炙之後飲冷貪涼而成故其初起以溫藥佐之效若屢進必加甚矣凡痢疾身熱脈大者不治豫重用芩連一二服熱漸減脈漸平者續用調中之劑亦愈唇紅口渴者不治有用黃連烏梅者有用人參白虎者但得應藥即有轉機見食即嘔不治名醫類案云方蔭山治一小兒八歲患時痢日夜百度食入即嘔以面作餅炙熟分二片以一片中空之用木鱉子三個去殼搗爛加麝少許填入餅中貼臍下軟帛系定外用熱鞋底尉之待腹中作響喉中有香氣即思食食少進是夜痢減半三日後漸愈豫用此法治噤口痢多驗勝於用田螺多矣渴而思酒者不治渴之甚茶水不能解故思酒嘔甚作噦聲音不治嘔之聲短噦則其聲重大而長胃中空則邪熱干之故作嘔作噦嘔出長蟲者亦不治皆驗目陷神脫者不治額汗指冷者不治若欲救之急用四君加木香乾薑此芩連之過劑也長蟲下多者不治胃氣敗蟲不得安也糞門如竹筒者不治莖頭起白點者不治痢多日腸胃熱甚有口角鼻門瘡爛者有腮腫牙疳臭爛者有身發紫癍者有肛門濕爛作癢者此等見症皆由初起不善治而得或誤服辛熱藥亦有之與傷寒狐惑胃爛發癍同類不治之症也若欲救療急須白虎湯加黃連下痢脫肛有虛有實虛者略努便脫色淡而不甚腫宜補中益氣湯陷者舉之肛門壅腫努甚脫出色如紫李身熱脈大此為濕熱下逼芩連山梔佐以理氣升提之味肛門脫出不宜見風洗冷水犯之則難收有痢止而肛不收者溫水頻洗軟帛托入再用石榴皮煎水洗之或用熱醋沃新布折坐亦好用藥有三法黴令長夏濕勝於熱治宜從濕入秋則熱勝於濕重宜清熱秋深久亢則濕氣盡消燥氣方勝用藥不宜燥劑蓋痢甚津液既傷燥與利皆損液之藥也黴令濕勝用平胃散加防風葛根以升清氣少佐芩連以清熱山楂神麯行滯一二劑後再加赤苓澤瀉車前以滲之入秋熱勝初宜柴葛以升清芩連以泄熱厚朴檳榔木香以通腸胃之壅閉車前木通以導其濕熱食滯不行神麯山楂麥芽以化之腹痛甚芍藥甘草以和之病熱稍平然後芩連可退再加和胃之品發於秋深久亢口渴唇燥舌起黑煤者有之津液大傷貧士無力服參豫嘗用沙參麥冬生地甘草以生津液少加芩連以泄熱白芍木香以和血行滯變燥為潤因乎時也痢有譁口刮腸之辨噤口者治在胃刮腸者治在腸噤口者得食便定刮腸者熱不除雖能食亦死膿垢從腸中刮下始而腸薄漸致腸化濕熱蘊於腸中如癰膿之腐爛而化出也腸刮而腐化者多屬小腸故紅痢腹痛甚痛甚則腸斷而死以大腸肥厚而小腸薄嫩也小兒夏月暑濕之熱客於營衛結成癢癤入於腸胃則為瀉痢痢之紅白如癤之膿血膿出不盡則癤必不收紅白不盡痢必不止其時瘧痢並作者數人皆用和解行滯之劑瘧先止痢亦漸減惟驚與痢並作者競不能救溪南吳氏子六歲園中隨賞桂花其夜發熱腹痛天明下痢上午驚作連下數行延豫至已二更矣急入診視額汗指冷脈息已絶後數日又一三歲子亦於夜間發熱腹痛天明驚作旋下白凍延豫至見其病難救不忍坐視勉與平肝風扶脾土之劑六君加柴胡鉤藤山梔白芍木香車前一服而驚梢定二服而食稍進但腹痛下痢不減第三日清晨連下數行而脫豫所見驚與痢齊作者竟不能救有驚定熱退而後痢作者又在可治之例有痢後作驚者脾土虧敗肝木生風亦不治之症痢後多有浮腫肚脹之患大概服芩連之後熱症既除寒症續起四肢冷皮色白而光亮者是也總以補脾去濕為主不得用辛熱藥有痢止未久而復作者腹痛後重糞後有膿血名曰休息痢此濕熱伏於曲腸之中最難速止豫用補中益氣湯加白芍木香茯苓車前子之類多愈雜治得心隨録可為法者二十二症家虞部奕皇侄之孫周歲盛暑時病壯熱煩嘔有汗是暑邪為患初與香薷飲一劑熱不退煩渴加甚豫曰時逢酷暑熱甚宜加黃連服藥後熱稍平而症不減嘔渴人困頭抬不起此熱傷正氣也熱甚務在必清正氣為熱所傷亦須急固方用人參麥冬陳皮半夏茯苓甘草黃連梔子竹葉心煎服次日精神起而熱猶不退豫曰精神起則人參可除熱不退者清涼之力薄當以生水之味佐之乃克有濟方用生地丹皮麥冬黃連山梔石膏加以二陳和胃連進二服熱退神安煩渴皆定小兒純陽之體暑為陽邪最傷心脾二臟熱而煩者心受之熱而嘔渴脾胃受之也心受之則黃連山梔胃受之則石膏竹葉純陽之體無陰以制則熱不能退故用生地丹皮麥冬生水以濟陽黃連得其滋助而功始倍更加二陳以和胃而胃氣不傷病因此愈此症熱經七日認症的確藥有次第故得收功使病家少有紛更則變生不測矣風暑合病為暑風暑喜傷心風喜傷肝此但有暑而無風故雖熱而驚不作豫故不用風藥兒體本不虛忽而神困者是正氣為熱邪所傷只宜瀉熱人參只用一劑後即除之且大便二三日一次裡氣不虛若再用人參必助邪為患矣用藥當見機者此也熱退旬日忽然又發嘔渴如前以俗情言必曰復感豫曰此胃家餘熱未盡天氣過亢餘熱復聚用養陰和胃稍加石膏二劑而平奕皇侄之孫女九歲風濕發丹遍身搔癢三日丹發未透熱未退大便多日不解腹痛此尋常小病也與疏托利濕消食之劑其夜忽發驚風目直大叫手足搐搦唇口連掣少停又搐一夜十餘次舉家驚愕延豫至初視之不解其故再四推求外無新感之風邪內有未泄之濕熱據侍者云因高處貓跳而受駭驚由是作豫曰脾經濕熱斷無作驚之理因於驚則脾家所蘊之熱乘驚而入於肝膽是脾移熱於肝病之變者也此病在脾則為濕入肝則為風肝得驚風病斯作矣其治法當疏肝膽之風泄脾土之濕表裡一通庶凡驟解稍遲病深則難救矣為處一方羌活防風天麻鉤藤殭蠶全蠍當歸赤芍枳殼大黃山梔木通甘草共十三味其法蓋合瀉青丸牽正散四順清涼三法以成疏肝泄閉之方一服而表裡雙解其病如失義呈朱嗣倚兄孫病春溫五朝大熱不退頭痛煩渴脈大惡人與火陽明邪熱甚也與小劑白虎湯初用石膏三錢不效加至五錢又不效病亦不加但人倦耳其家請易方豫曰藥對症故病不加藥力輕故病不減據症而論無可易也用熟石膏一兩知母二錢甘草五分粳米二錢再一劑而熱退治麻痘石膏宜生用傷寒方中石膏宜煨用胡旭如兄孫女六歲春中患發熱頭痛嘔吐脈大唇紅如朱豫曰此胃熱嘔吐也用陳皮半夏茯苓甘草知母石膏粳米煎一劑愈此病初作而用對症之藥也汪利賓兄孫發熱嘔吐食少出多長蟲出目眶陷心煩不寧方春木氣旺上衝於胃宜瀉肝和胃用橘紅半夏茯苓甘草加代赭二錢水蘆根五錢黃連三分一劑愈瀉肝熱而用黃連實則瀉其子也岩鎮潘氏子十歲壯熱五日不退目竄反張頭額紅腫醫作驚風治用牛黃抱龍等丸不效請豫治診其脈大豫曰此太陽風症無汗為剛痙今額上紅腫兼濕毒上攻當從太陽處方用羌活五分秦艽一錢連翹赤芍蒼朮各八分荊芥防風蟬蛻木通各六分酒炒桑枝一錢一劑病減十之三二劑病減十之七除去羌活蒼朮加入鉤藤菊花炒梔子馬料豆又二劑而痊岩鎮方氏子周歲深秋無外症夜間忽然吐乳一口隨發驚搐二次初服表藥一劑搐不作無熱症但夜間煩吵又服廣東抱龍牛黃等丸乳食如常六日不大便六日後又復發搐抽出大便青黃色微有痰一連三日抽掣無時搐定時安臥能乳不發熱請豫治豫曰驚搐不由外感無寒熱痰食之患此病從內發也發時吐乳一口者時方食乳沖湧而出非吐乳也外症面色青肝病也手掣頭搖肝木生風之象顱腫筋現目生脂唇口紅皆火象也小兒純陽之體先天不足不能制火加之秋燥衣棉早郁遏太過熱從內生上衝肝膽而作搐病自內生當從內治用平肝養陰之劑生地丹皮麥冬炒梔子陳皮茯苓澤瀉鉤藤代赭一劑服藥後胸中暖氣微有痰聲食乳後湧出痰二口此膈間有阻滯次日用分治之法早用橘紅半夏茯苓石菖蒲少加生薑先服半杯以開其痰午後用六味加參麥陸續夜服搐雖作而勢漸緩連守二日搐定人倦抱起時頭尚搖面色青時作努恨聲此肝氣未舒也易以柴胡鉤藤蘭葉茯苓橘紅半夏甘草一劑而肝氣舒日間困倦夜間啼吵不寐復請豫治視其唇口乾目生脂舌有刺頭皮光急青紫筋現按之如熟柿子抱起時頭傾不能豎豫曰顱脹如此急宜養陰以平肝腎之熱大劑六味加白芍龜板磁石羚羊角外用塗囟法導引法二日而諸症略平除去磁石羚羊加入百合龍骨又二劑而顱收大半夜亦安臥五日後抱起頭可豎目有神命自制六味加麥冬龜板緩緩調之塗囟法龍骨醋磨汁攤青絹上微焙溫緊束頭顱一日一換導引法用肉桂三分川椒三十粒研細少加白麵薑汁調成膏焙熱貼臍下及兩足心熱手頻護二日後揭去小兒陰不足不能服桂附故用導法可以引熱下行椒性善下勝於附子顱脹與囟填不同囟門凸起為囟填屬心火錢氏用瀉心湯顱脹則頭皮光急額角皆大肝腎虛熱上衝六味地黃湯加重劑以鎮之又有囟門不合頭骨分開不病而顱解此先天不足之質其兒面㿠白目白睛多又宜陰陽雙補六味加鹿茸龜板如無鹿茸角膠代之岩鎮程氏子六歲冒風傷食發熱咳嗽嘔惡不思食此尋常病也初服疏散消食藥嘔咳不除熱不退汗出氣喘以時感而見虛症人漸困請豫治已五日矣診其脈弦大熱不退咳出痰沫食入則嘔人極困此秋熱傷肺正氣虛熱邪留於肺胃宜瀉熱以保肺氣所服荊防柴葛秦艽赤芍神麯麥芽之類皆非對症之藥故病日加甚方用沙參麥冬桔梗甘草茯苓橘紅炒山梔加竹葉心粳米煎一劑安二劑愈解曰發熱喘嗽熱在肺也嘔渴不食熱在胃也故以甘桔梔子清肺竹葉麥冬清胃藥雖淡而功自專且與質弱之兒相稱所謂補而不滯清而得當者也海陽金氏子十三歲腹痛三年雜治不效發則喊叫不可耐遇風則作寒熱嘔吐汗出面青脈弦豫曰此風根也用桂枝防風柴胡黃耆白朮陳皮半夏白芍甘草加生薑煎二劑平四劑愈湖邊程芑堂兄子十歲久患牙腫不消屢用吹藥脫去一齒因大駭請豫治豫診視無外症令服六味地黃湯不用吹藥為之立案云小兒純陽之體陰未足每多熱症故錢氏以六味為主治久患牙腮腫不紅不痛非陽明風熱可知吹藥過施致損一齒古方吹藥多用冰硼冰片辛竄之性直透齒根硼砂能柔五金化腐肉所損之齒損於藥非損於病也且內熱脈數時作耳閉皆陰虛之明證當此夏令火旺金水俱虧服藥宜以養陰為主一切吹藥皆不可必陰得所養則虛火自不上浮齒患自然不作治病求本此之謂也六味加麥冬霍斛蜜杵為丸服之兩月病不復作南源王氏子患血舌色若紫肝自言作脹無外症或令以刀劙出血病當愈其父不敢褪負而求我診其脈數大方用生地五錢丹皮赤芍梔子各一錢紅花犀角菖蒲枳殼木通甘草各五分命以銀針刺舌旁服藥二劑刺處先退又二劑舌尖退出再四劑而痊鄰人程氏子十歲夜飯後從戲臺跌倒而下賴人提起回家當時嘔吐初吐出夜飯續吐清水扶坐床上吐則以盆盛天明請豫看吐出之水緑如菜汁豫曰此膽倒也翻跌而下膽汁傾出汁盡則死矣為定一方橘紅半夏茯苓甘草枳實竹茹六味為溫膽湯再加棗仁一錢代赭石二錢以收正其膽腑可名正膽湯一劑吐止二劑頭目清而愈矣因憶昔年曾見此症二處不知治法皆不救溪南吳氏子三歲四月初食烏飯油膩而起發熱腹痛旋服疏散消食藥熱不退更醫服藥皆主消食熱退復發病經兩月請豫治診其脈小弱面色青而㿠白二便利腹無所苦午後發熱天明漸退食少人困豫曰病雖起於傷食屢服消伐之劑食滯久已消矣過消則胃傷熱久則陰傷故食少神困汗出而熱不退也方用人參麥冬陳皮穀芽扁豆茯苓甘草加小棗二枚二劑而熱退麥冬易白朮又二劑而食加山根本家二歲子斷乳後傷食腹痛醫與消導過度人漸黃瘦又謂其有疳積令服雞肝藥旬日之間肌肉盡脫僅存皮骨請豫治豫曰大肉已脫無藥可療速尋乳母試其肯食乳否每日早晨先與參米飲半杯以壯其胃氣然後食乳一月之後復請豫視面圓發澤已無病矣此消伐損脾之誤非本氣自敗者故得痊昉村本家一女十歲脾虛有濕浮腫肚脹服補脾利濕之劑愈而復者再臍中流出淡黃水水中流出蟲一條長四寸此亦未見之事水與蟲皆濕熱所生也仍用補脾利濕之劑每劑加土炒黃連三分漸次愈愈後多服補脾末藥病不復作此水退築堤之義也梅口江氏子七歲先因濕熱傷脾浮腫肚脹目發黃疸數日而瘧作又數日而下痢紅白一身而見四症豫曰病雖疊見皆濕熱所生藥可兼治方用柴胡黃芩蒼朮厚朴陳皮神麯檳榔大腹皮赤芍茵陳山梔木通甘草出入加減先止瘧次止痢目黃腹脹旬日而退唐模書顏侄之孫三歲戊申秋抄患痢純白先期發熱驚搐搐定而後痢作日夜百度米粒不進此噤口痢也況在驚後視其勢不可為矣力求豫治不得已先用木鱉子三個煨熟去殼加麝香一分搗如泥旋作麵餅乘熱劈開以一片攤藥合臍下此先賢舊法也用之屢效姑與之逾時稍能食粥為定一方人參白朮茯苓甘草當歸白芍黃連木香連進二服痢少減食少加再以石蓮石脂白頭翁罌粟殼等味出入加減去人參則食少去黃連則痢多人參黃連競不能除守定一方旬日而愈豫前所治驚後痢作皆不得起不意此子競得成功雖賴人參之力亦由驚定而後痢作小有不同義成朱藻卿兄子周歲時感發風痰之病五日不解延豫治時壯熱煩渴手強目竄咬奶咬唇舉家以為驚作豫曰非驚也此陽明熱甚生風也煩熱汗渴皆白虎症小兒純陽之體一冬蘊熱內伏陽明因感驚風引動伏熱而病作若隨俗用化痰抱龍等丸便不可救方用熟石膏五錢知母麥冬炒梔子各一錢枳殼竹葉各五分粳米一錢長流水煎一服而煩熱減二服而汗渴除藥減半再一服而熱退然後用甘桔二陳清痰和胃而痊張翼高兄孫女九歲素有蘊熱目赤瘰癧之患復感時疫發熱煩躁遍身發出紫斑間有青藍色者口鼻出血有穢氣大便不解書所稱胃爛發斑不治之症也急與犀角地黃湯加元參石膏枳殼木通一服病無增減次日分兩加重更加大黃二錢連泄兩次熱退血止稍能食再與涼血解毒之劑數日而痊此以重劑救急症也稍遲則無及矣桂林洪氏子五歲發熱腹痛頭皮光腫此病之因於濕者用平胃散加羌活秦艽神麯木通一劑次日手足皆腫如稱錘豫曰此五腫也脾家風濕循經而發加入獨活防風桑枝黃柏腹痛甚再加枳殼檳榔一劑大便連泄數行遍身發出小水泡頭腫消腹痛止再與平胃散加防風神麯赤苓炒梔子數劑水泡退皮手足漸消而愈紹村張氏子六歲腹脹如鼓青筋現能食而肌瘦內熱大便後有血與香砂枳朮數劑消未久而脹復作彼求末藥方用廣陳皮六錢真神麯赤茯苓各一兩雞肫皮五穀蟲洗淨炒各八錢胡黃連五錢大幹蟾二隻共為細末服完一料腹脹消肌肉生矣丙辰長夏鄂霞侄之孫周歲患暑風壯熱唇紅一連七日目竄反張抽掣無定視其胎氣旺能食乳風暑皆盛實證也連用香茹防風柴葛黃連石膏重劑調下益元散全然不效因思六淫之感當重歲氣辰戊之歲上見太陽太陽膀胱之邪當用羌活黃柏此黃連之所以不效也復定一方羌活防風秦艽天麻鉤藤黃柏赤茯苓桑寄生滑石甘草一劑而抽掣減二劑而熱退搐定掣多筋弛手足不利續服和血養陰之劑數月始能坐立一時經歷暑風症甚多胃氣未敗者皆用羌活黃柏取效歲氣之應如此方脈治驗隨録十五症江麗彩兄素有痰熱手戰之患一日忽頭眩嘔吐心煩狂叫牙痛如錐又如蟲行口漱涼水溫則吐而易之失水則痛叫不可耐舌已咬碎口不能言心卻明白手雖戰而能書屢書燒死也三字大便四五日不解小便赤而少脈弦滑按之搏指此因思慮過度氣結火鬱兼之平日好酒濕熱內蘊結為實火症也病在胃不可用下藥以大苦寒之劑降之生地黃一兩搗汁丹皮二錢麥冬三錢黃連五分炒梔子一錢五分花粉知母熾實木通各一錢生石膏二兩竹葉心一錢五分犀角磨汁一錢長流水煎連服二次藥後梢平靜二便利痛定口不漱水夜少臥次早用逍遙加減柴胡薄荷生地丹皮茯苓炒梔子陳皮半夏甘草竹葉琥珀二劑愈程氏子年少好酒每醉必吐吐甚帶血心中嘈雜此是胃家血宜安胃不得作血症治陳皮六分半夏曲六分茯苓一錢甘草三分沙參一錢麥冬八分老米二錢乾荷葉五分一劑定二劑愈此治江麗彩兄次日事也時有議豫用藥過甚者豫以此方示之凡治急症如救焚拯溺刻不容緩治緩病當用調和之法輕重緩急用藥之權衡也胡依蓮先生孫媳産後五朝發熱腹痛小便不利服産後通套之劑病反甚夜請豫視診其脈弦大唇紅面赤目怒心煩少腹脹痛已極昏悶者數次豫曰此惡阻膀耽也徒利水則惡不行破惡則水不利宜二法並用或可救急丹參三錢桃仁歸尾赤芍紅花元胡澤蘭車前木通各一錢柴胡升麻枳殼各六分琥珀研末四分急流水煎服夜半進藥天未明惡水並行而解雄村曹氏婦年三十餘黴雨初過日氣方蒸園中摘莧而歸發寒熱一日夜小便不利次日頭痛腹脹或煩或嘔服藥病加甚豫過其地邀入求救診其脈弦大發熱腹脹坐臥不能勢甚迫豫曰此風暑濕三氣合而為病也與胃風湯調服天水散未時進藥申時小便酉時熱退藥病相當所謂迎刃而解也胃風湯即平胃散加防風漁梁胡氏婦年四十久不乳忽內熱頭昏兩乳作脹以手捻出鮮血醫用逍遙歸脾脹甚血愈多豫曰脈弦大肝熱也用生地丹皮生白芍青皮澤蘭車前炒梔子麥芽二劑平四劑愈黃備張緒周兄內人患頭痛痛在額甚至自撞牆壁已半年矣雜治不效豫制都梁丸與服十日而痊福林侄孫婦早寡姑老子幼素多憂鬱內熱食少胸中隱隱痛不安臥者旬日忽嘔出膿血數口診其脈滑數按之無力病似肺癰肺癰為實證脈無力難勝重劑因請親家汪贊禾先生商酌議曰脈無力屢言心中難過宜以輕劑消息治之甘桔牛蒡茯苓橘紅貝母紫苑澤蘭數味次日忽大吐盈盆盡是膿血豫曰肺癰咳唾膿血無此之多一湧而出胃院癰也膿血去多理應重補慮其有餘不盡猶與橘紅茯苓穭豆銀花桔梗澤蘭甘草等淡劑以滌胃中余穢二日膿血已盡人雖困能食粥然後用黃耆獅黨麥冬歸芍生地丹皮茯苓貝母甘草等補劑幸能受補分兩日加調理半月而痊江振霞表兄至日換皮袍受寒怯寒發熱服溫散之劑微汗熱已退時作寒戰小便不利勢甚迫夜半請豫視診其脈細弱無力平日小便點滴汗出之後點滴全無用茯苓三錢人參一錢肉桂五分服藥後小便利安臥而愈孝廉朱直如年四旬得軟足病五年不愈望其顏色肌膚猶在豐腴之例聆其聲音嘹亮如無病人問其平日保身之道但言心事有之一切頗知自愛切其脈則舉指弦大重按有力合四者而論非虛證也既非虛證治宜除病風從上受濕從下受傷筋則筋縱不能束骨骨重難以久行而失治致成痿躄者有之為著痹者有之人身之受病如器之受物濕留於身久而不去則生熱熱氣上浮致有頭旋眼黑之患流於經絡致有足膝動掣之患脈來弦大有力有力者病氣旺也非氣血之有餘也素多痰亦濕熱也欲治此病當先祛濕濕去則筋強筋強則骨健筋骨健強舉步自然輕捷不言補而補在其中矣方用茅蒼朮三兩黃柏一兩苡仁二兩茯苓五加皮蓽薢天麻各二兩廣陳皮半夏各一兩五錢甘草一兩共製為細末用嫩桑枝四兩熬汁疊為丸緑豆大早服三錢開水送下六淫之邪乘虛不乘實軟足病雖由濕傷筋始得之時亦必乘虛而入病久且深已難提出服清利濕熱之藥一月病無增減者實有其病當之故略覺鬆耳道路既開於前再以淡滲之味加入堅骨強筋劑中攻補兼施亦一法也為定第二方赤白首烏杜仲牛膝枸杞子巴戟天虎脛骨茯苓苡仁澤瀉五加皮黃柏鹿筋熬膏和蜜為丸服第二方三個月自秋歷冬弦大之脈漸平筋骨稍強步履漸覺輕便但言腰部虛似欲人扶豫曰腰者腎之府補腎當君地黃藥無二君首烏易地黃時值寒冬脈已平黃柏理應除去苡仁味淡亦可除用大熟地六兩加黃耆三兩附子一兩以鼓動一陽來復之氣再加陳皮一兩利膈消痰能使全方活動守至春回自當漸入佳境春回步履漸輕束裝北上矣後塢張薪傳兄感時氣傳染之熱症經旬不解一日請豫治入其室聞呻吟之聲診之身熱脈大一日夜不小便少腹脹痛欲死豫曰此熱邪傳入太陽膀胱腑急宜五苓散下之稍遲膀胱壞矣茯苓三錢豬苓澤瀉白朮桂枝各一錢長流水煎服未逾時小便如注床上床下成流汗出倦臥病遂漸解此仲景傷寒大法也侄孫乾吉得傳染病時值深秋初感面暗指冷醫以為寒疏散藥中用桂枝附子煨薑一劑人事昏沉熱不退豫適病足其母位而求救勉強往視診其脈數大目瞪口張唇焦舌黑以指探之枯稿如銼豫曰熱才三日津液雖傷斷不如此之甚是津液為藥所傷也急救津液更無他法用大生地一兩大麥冬五錢知母丹皮各二錢柴胡青蒿各一錢生甘草五分加梨汁沖服徐徐進藥盡一大劑人事漸明舌稍潤再進一劑熱退能食次日午後忽大寒振作口鼻俱冷其母急走來告豫曰無恐此變瘧也爾後回身已熱矣小柴胡中猶加知母麥冬數日而痊傳染時氣在七日前和解居多豫用大劑急救津液是醫藥非醫病也時令傳染多有似寒症者香蘇飲為妥當若遇孟浪之輩動輒薑附桂枝殺人甚速録此以為戒文學汪繹如初夏得心病有似癲狂之狀徹夜不成寐舉家驚愕甚可慮眼藥旬日有用逍遙加味者有用補心丹者有作痰治用膽星者作火治加黃連者皆不效請豫治診其脈弦大重按無力唇紅面赤豫曰脈大無力非實火也此由用心過度心火上浮不能下交於腎腎水虛不能上潮於心當用交通心腎之法以豫自服八仙長壽丸辰砂為衣令早晚各服三錢納心火於腎水之中以成既濟之象服之數日神安脈靜守服此丸病遂愈豫治心腎不交用六味地黃丸辰砂為衣效者甚多是能以法治病者施德木匠黃老三病寒熱頭痛初服疏散藥頭腫如斗大額上皮綻漬出黃水服清震湯不效七日不大便小便亦少診其脈滑實豫曰此濕熱壅甚當服清利之劑用連翹赤芍枳殼防風檳榔厚朴大黃木通生甘草一劑二便利腫微消除去大黃加入穭豆菊花二劑而愈西干汪氏女年十八將出閣傳染時熱病適逢經後熱入血室十四朝而熱解頭髮盡落竟成一禿子不能嫁請豫治豫曰發為血之餘熱傷血故發落重宜養血兼服丸藥趁此初虧發或可生久則難出矣四物加阿膠以養血柴胡以疏達肝氣使之上升發之生必秉火氣再加枸杞以補木中之火服之兩月發漸生半年而盈尺此是因熱邪所傷非本氣內虧故能應藥治熱病多服黃芩發秉火氣而上生養血中宜加補火之味若用桂附反傷其血惟枸杞一味潤而不燥此用藥之善也次年出閣髮長可綰矣張光遠兄第五媳勞傷小産血多一空而脫豫在近鄰夜半叩門求治診其脈已絶身尚溫微有鼻息其家以為死矣欲放平豫曰且慢問家有人參否答曰有參一錢豫曰足矣用當歸一錢同煎以匙呷之徐徐盡一酒杯靜候片時復診視脈微續唇口微動服二煎安臥至天明能食粥再與歸脾湯二劑而起此症有不死者三豫在近鄰一也家有人參二也命勿放平三也三者缺一死矣此時用藥只有參歸二味氣血雙提若再加一味便非治法且不能受病可治病家不知信任者録四胡仰山兄素善飲酒貪涼病因於濕濕之在外者浸淫兩足潰爛而出不盡則臀生癤肛門腫濕之在脾肺者則生痰作嗽上為喘呼不得臥喘甚則汗大泄數見脫象而復定者胃氣強腎氣不敗也豫用腎著湯茯苓三錢白朮半夏澤瀉各一錢乾薑五分穭豆二錢大豆黃卷更好長流水煎服因痰而嗽治在脾因濕生痰當利濕濕從下受著於腎故用腎著湯加半夏以潤腎而以穭豆泄腎之濕也藥力緩服之二日無大效其家不信竟服金匱腎氣湯數日而死蕭氏女年十五日隨母績麻一春多雨坐處常濕濕從下受致有腳氣之病始而右足腫痛服藥未已左足又腫漫腫不紅漸生寒熱甚致頭目眩暈治之不善患延一月請豫治時目直頭仰腰背反張人事不省已成痙痓之症豫曰此腳氣上攻之病風濕在經久而失治漸傳入臟急宜從經解散可望生機方用羌獨桂枝秦艽萆薢蒼朮防己川芎橘紅半夏石菖蒲連翹木通甘草加酒炒桑枝共成一劑其家畏用羌獨另請他醫先與蘇合丸續投溫補之劑竟成不救潭渡黃氏婦患腹痛痛在胃脘煩嘔不能食日夜不成寐延豫治時病旬日矣診其脈滑大體素豐腴見其痛甚作暈且與和胃理氣一劑不效次日復診豫曰腹痛久脈當沉細寸口滑大而數此胃脘癰也病者又言一月之前大便曾下惡血近來不下其痛有如雀啄之狀此胃中積瘀漸作癰膿無疑必待嘔出膿血其病方解膿尚未出方用桔梗甘草連翹蒡子銀花赤芍丹皮歸尾乳香貝母枳殼為一劑飲藥些須無大驗病家以為荒唐遂更醫為之一嘆上里江氏婦患休息痢二年雖愈而腸垢未盡能食體漸復懷孕後不時猶有坐努之弊至産後大便自前陰出醫用分利提補之劑半年不效坐努難任請豫治豫曰大小便並出前陰非腸交也不自腸癰致病非腸潰也大便日夜十餘次前出者十之七後出者十之三是必大腸易位而小腸猶故道也大腸之所以易位者必由臨産用力而就前陰産後不歸穀道致成斯病且腸本有垢垢則滑輕車熟路久而成慣坐努無時此致病之由也欲歸穀道當先實腸腸實則水穀自分再與多服補中益氣湯庶幾可望大氣旋轉若大氣不升糟粕不聚無返本之期矣其家無力服參遂寢豫議見而不能治者録四鄰翁程彤身體素強無血症年近七旬忽嘔血脈弦強與以清熱平肝之劑血遂止一月後胸中忍忍又吐數口服藥又止一日忽吐出肝一塊重兩許再吐如棋子大者五六遂困頓不食數日而逝溪項錦州兄長媳久嗽咯血內熱人困延豫治時病數月矣診其脈弦數按之無力豫曰此火盛灼金之症時值夏令火旺與以瀉火保金之劑守至金秋得令再望生機所服煎劑大概參麥居多丹皮茯苓紫菀百合之類出入加減一日吐出肺兩塊意如熟豬肺胸中忍忍痛再用參麥加入白芨阿膠等昧遂不應未幾而逝鄰翁何天一患腹痛痛甚頻下大便黑如炭小便如墨汁腹痛日夜不止食入作嘔用芍藥甘草湯不應六君不應自言胸中作燒加入芩連又不應其人平日好酒恆蓄燒酒於家無夜不醉老年不勝曲糵此腸胃腐敗無治也數日而逝豫前所見酒客得病下如敗醬如漆渣者數入皆不治但未有如此之黑也大便下血者不死小便尿血者多死豫曾治畢文高兄溺血二三年一發甚至歲發一二次服補中益氣加炒黃柏山梔數劑而止年過七旬服藥無效竟以尿血死後又見胡秉軸兄畢振宇兄尿血成條藥皆不應逾月而死見聞事實録四一族兄賣水為生好酒夏月臥處嘗濕病寒熱旬日遍身發出瘡疥一瘡中生一蟲癢不可耐以針挑取小者如粟大者如米或令以雞蛋攤餅貼之不能遍及江藕塘先生命採桑葉一石曬乾鋪樓板夜臥其上桑葉能去風濕蟲聞桑葉香盡皆鑽出再以黃柏苦參作湯浴之數日而愈醫者意也此不藥之藥也龍松年先生云一人病咳經年皮膚甲錯肌肉盡脫胸中隱隱難過作肺痿治久不效自度必死時逢初夏枇杷正熟醫令取黃熟枇杷三十斤去皮核熬成膏藥一大斗每日早晚開水溶服二合服未畢咳止胸開皮膚漸潤肌肉漸生此潤肺之功也肺喜潤脾喜燥潤肺之藥多不利於脾二冬之類是也枇杷色黃味甘能補脾土以生肺金勝於二冬多矣此其所以效也一人久患鼻淵濁涕腥穢無肯與近者時逢長夏醫命取艾茸四兩攤作二餅用新瓦兩片烈日中曝熱攤艾茸於凹几上先安一枕以額抵之冷則頻易數日而病除此之謂日灸針鋒相對腦寒去矣大凡病久不愈者藥未至病所耳江斯符兄作客湖南見一行主人風疾在榻交易寫算尚能應客一遊方賣藥者在門擁擠多人有礙客商行主人惡之命驅去賣藥者顧謂主人曰勿驅我我為爾起足疾主人耐之至夜沽酒邀入賣藥者問足廢幾年矣對曰三年矣又問痛否對曰陰雨時掣痛間此地有騾馬坊否對曰有引至坊中鏟取騾蹄底下皮兩許至行中酒洗瓦灸為末瓶中傾出炙過乳香一錢和入分三日淡酒沖服三日之後下榻移步再服一料足疾愈矣江斯荇兄親見其治歸以伺豫曰騾蹄治風疾書有之乎豫曰未之見也問何以能速效豫曰騾馬善行去風其力在蹄加乳香借酒力安得不速阿膠驢皮所煎尚能去風況騾蹄乎此四者中在方書之外實在理法之中録之足以廣醫家之見識婦人病婦人孕八九月乳流出者名乳溢血氣旺也所見甚多廣陳皮五分醋炒麥芽二錢煎服自愈室女年大乳流出者名乳泣多隱而不言有其母代求藥者豫以黑逍遙治之未幾出閣而病愈中年婦乳脹流血名乳衄三十年前曾見姚氏婦今又見張氏婦初流血續出黃水豫亦以黑逍遙愈之此三種皆可治之病也室女少婦天癸未行有每月鼻衄者有每月齒縫中出血者名齒衄又謂之倒經皆經水逆行之病豫所治多人方用四物加丹參梔子元胡益母早之類月季花一朵同煎天癸行而衄止看虎口錢氏仲陽看小兒脈紋男左女右取決於虎口之次指未有究其義者豫考之素靈恍然悟曰以其屬陽明之脈之根始也陽明之脈起於大指次指之端兩陽合明故曰陽明陽明常多氣多血有病則先應之小兒純陽之體更於此手始故即於此以觀其變焉可也先師有言小兒之脈見於虎口亦猶大人之脈見於寸口也又云三關直透者不治屢驗看脈紋辨三關是近世幼科一訣三關之中復有曲里彎外青紫紅黃等語屢試多不大驗莫若以色浮而顯者為邪在表色隱而暗者為病在裡青紫為驚熱為實邪淺紅為虛熱青黑而沉為寒為痛黃白為虛而無熱一切惑人之處皆可盡掃蓋以視幼吉凶多決於精神面目所重不在此也小兒常有之病一曰癲癇之為病小兒常有之諸書皆言積驚成癇故有驚風三發便為癇之語大概肝主驚風初作之時不為疏解便投金石丸散使邪留於心包肝膽之中久而不除生痰生熱觸著便發或目直喊叫搖頭手掣口吐白沫或卒然昏僕不知人或作豬聲羊聲雞犬牛吼之聲後世遂有五癇之名陰陽之別多方雜出莫非雄朱金珀膽星牛黃鉛粉之類愈治愈深逼成壞證者有之豫治此證惟以肝主驚風為本得之未久體質旺者用錢氏瀉青丸去龍膽加橘半以疏豁之病久體弱者用逍遙加橘半以疏達之搐鼻散不時嚏之兼以調和胃氣久久自除一曰疝疝之為病雖發於腎實本於肝雖始於寒實成於熱時發時好腫一睪丸故名偏墜邪伏厥陰之經不移之病也小兒多有之皆由坐臥濕地而得古人治疝每用寒熱兼施之劑亦有初生月內即患此者濕則有之寒則必無不可以溫藥急攻豫制治疝煎方柴胡青皮鉤藤香附梔子橘子川楝子山楂子荔枝核茯苓穭豆澤瀉之類出入加減外用橘葉蔥艾三物煎洗久久自除一曰鬾病巢氏云婦人懷孕有鬼神導其胎中妒嫉小兒致令此病其狀微微下利寒熱往來毛髮鬇鬡情思不悅也千金論亦云鬾者小兒鬼也乳子未能行其母復有孕令兒漸漸羸瘦骨立發稀大便不勻乃鬾病也法當用紫霜圓下其鬾乳後以益黃散補之令兒斷乳即安豫謂婦人乳子情意所關腹既懷娠生氣注於胎雖乳何益淮南有言男子藝蘭美而不芳鬾子得乳萎而不澤情不相往來也此真透達之言鬼神之説無足為據速令斷奶為是一曰無辜疳無辜鳥名啼時兩頷扇動如瘰癧之項小兒肝熱目暗頸核纍纍狀類無辜因以為名後人穿鑿遂謂兒衣夜露不收為無辜鳥羽所落感而成病荒唐之甚豫用逍遙加減緩緩調理愈者甚多少見二症黃濱餘外甥女七歲下白兒不自知其母疑焉夜臥時以帛墊其身始識其病請豫治豫曰女子二七任脈通始有赤白帶下之病任脈未通帶脈未成何以得此是必脾經有濕兼稟母氣而然用陳皮白朮茯苓山藥苡仁扁豆芡實白芍甘草九味為末服之止其女出閣逾年一産而脫體氣早虧之過蕭方來兄子天姿聰敏十歲時即有夢遺盜汗之患用六味加龍骨龜板以靜攝之以龜龍皆潛藏靈物也久服病漸止畢姻後竟以損症早逝華先生中藏經論治夫病有宜湯者宜圓丸者宜散者宜下者宜吐者宜汗者宜灸者宜針者宜補者宜按摩者宜導引者宜蒸尉者宜暖洗者宜悅愈者宜和緩者宜水者宜火者種種之法豈惟一也若非良善精博難為取愈庸下淺識亂投湯圓丸汗下補吐動使交錯輕者令重重者令死舉世皆然其湯可以滌蕩臟腑開通經絡調品陰陽祛分邪惡潤澤枯朽悅養皮膚養氣力助困竭莫離於湯也丸可以逐風冷破堅癥消積聚進飲食舒榮衛定開竅緩緩然參合無出於圓丸也散者能祛風邪暑濕之氣攄寒濕渾濁之毒發散四肢之壅滯除剪五臟之結伏開腸和胃行脈通經莫過於散也下則疏豁開塞補則益助虛乏灸則起陰通陽針則行榮引衛導引則可以逐客邪於關節按摩則可驅浮淫於肌肉蒸尉闢冷暖洗生陽悅愈爽神和暖安氣若實而不下則使人心腹脹滿煩亂臌腫若虛而不補則使人氣血消散肌肉耗亡精神脫失意志昏迷可汗而不汗則使人毛孔閉塞悶絶而終合吐而不吐則使人結胸上喘水食不入而死當灸而不灸則使人冷氣重凝陰毒內聚厥氣上衝分墜不散以致消滅當針而不針則使人榮衛不行經絡不利邪漸勝真冒昧而昏宜導引而不導引則使人邪侵關節固結難通宜按摩而不按摩則使人淫隨肌肉久留不消宜蒸尉而不蒸尉則使人冷氣潛伏漸成痹厥宜暖洗而不暖洗則使人陽氣不行陰邪相害不當下而下則使人開腸蕩胃洞泄不禁不當汗而汗則使人肌肉消絶津液枯耗不當吐而吐則使人心神煩亂臟腑奔沖不當灸而灸則使人重傷經絡內蓄痰毒反害於中和致於不可救不當針而針則使人氣血散失機關細縮不當導引而導引則使人真氣勞敗邪氣妄行不當按摩而按摩則使人肌肉䐜脹筋骨舒張不當蒸尉而蒸尉則使人陽氣偏行陰氣內聚不當暖洗而暖洗則使人濕灼皮膚熱生肌肉不當悅愈而悅愈則使人神失氣消精神不快不當和緩而和緩則使人氣停意折健忘傷志大凡治療要合其宜脈狀病候少陳於後凡脈不緊數則勿發其汗脈不疾數不可以下心胸不閉尺脈微弱不可以吐關節不急榮衛不壅不可以針陰氣不盛陽氣不衰勿灸內無客邪勿導引外無淫氣勿按摩皮膚不痹勿蒸尉肌肉不寒勿暖洗神不凝迷勿悅愈氣不奔急勿和緩順此者生逆此者死脈病之法備説在前喻喜言先生議病式從上古以至今時一代有一代之醫雖神聖賢明力量不同然必不能捨規矩準繩以為方園平直也故治病必先識病識病然後議藥藥者所以勝病者也識病則千百藥中任舉一二味用之無不通神不識病則岐多而用眩凡藥皆可傷人況於性最偏駁者乎邇來習醫者衆醫學愈荒遂成一議藥不議病之世界其夭枉可勝悼哉欲彼此惑無如議病病經議明則有是病即有是藥而不知者必欲執藥性為去取何其陋耶與門人定議病式某年某月某地某人年紀若干形之肥瘦長短若何色之黑白枯潤若何聲之清濁長短若何人之形志音樂若何病始何日初服何藥次服何藥某藥稍效某藥不效時下晝夜孰重寒熱孰多飲食喜惡二便滑澀脈之三部九候何候獨異二十四脈中何脈獨見何脈兼見其症或內傷或外感或兼內外或不內外依經斷為何病其標本先後何在汗吐下和寒溫補瀉何施宜用七方中何方十劑中何劑五氣中何氣五味中何味以何湯名為加減其效驗定於何時一一詳明務令纖毫不爽起衆信從允為醫門矜式不必演文可也某年者年上之干支治病先明運氣也某月者治病必本四時也某地者辨高卑燥濕五方異宜也某齡某形某聲某氣者合色脈從圖萬全也形志苦樂者驗七情勞逸也始於何日者察久近傳變也問藥物驗否者斟酌己見也晝夜寒熱者辨氣分血分也飲食二便者察腸胃乖和也三部九候何候獨異者推十二經脈受病之所也二十四脈見何脈者審陰陽表裡無差忒也依經斷為何病者名正則言順事成如律度也標本先後何在者識輕重次第也汗吐下和寒溫補瀉何施者求一定不差之法也七方大小緩急奇偶復乃藥之制不敢濫也十劑宣通補泄輕重滑澀燥濕乃藥之宜不敢泛也五氣中何氣五味中何味者用藥最工之法寒熱溫涼平合之酸辛甘苦鹹也引湯名為加減者循古不自用也刻效於何時者逐款辨之不差以病之新久五行定痊期也若是則醫案之在人者工拙自定積之數十年治千萬人不爽也醫宗必讀全經始知治法醫家始讀岐黃書識其病之所生不能通悟治法以全書古奧難乾記誦多有棄而讀後世淺近之書者至滑伯仁張介賓汪訒庵諸公節取經言裁成類纂雖為醫門捷徑而日復一日漸失全經因思漢末華先生中藏經祖述岐黃備言治法蓋由素靈淺而出之者也華先生神於醫有剖腹浣腸之技而獨述經言不為奇論是欲以規矩繩後世不以長技授人其慮遠矣豫自少至老苦讀全經僅足知醫行之一字多有未備洵乎醫道之難言也仲景長於湯液針灸之法間一及之宗仲景者續稱大家豫習其方以應時變所遇必欲針灸及按摩導引諸法者百中一二亦嘗用之古法中又不徒以一方畢乃事也近世以來惟尚虛名不求實學徒有醫之名而無其實千思百慮啓悟後人於華先生論治之外更録喻嘉言先生議病定式為醫家診治之大法後之學者能從此法不難入仲景之門望岐黃之道矣診治雜言凡視病初起未藥時最宜斟酌一病到手輕者勿論形色脈象一有疑焉便不可忽病初起服藥一差如領路的錯了趕回來豈不耽誤舉業重首藝為將重先鋒訟獄貴初供善奕者不失先著病起用藥一差勢必加甚更醫診視須振衣揭領小誤不難持正若大虛似實大實似虛以寒為熱以熱為寒冰炭之分霄壤之隔矣經言勿實實勿虛虛損不足而益有餘如此死者醫殺之耳兒病初作服輕劑病未減後手略一斟酌不難取效若開手孟浪病勢日加最難接手稍不説明罪歸後犯一病到手小有疑義未決恰值匆忙用藥且宜從緩若疑團未解妄施猛烈之劑一或有差追悔無及有寒邪未解誤投涼藥謂之入井下石熱邪未發誤投熱藥謂之抱薪救火此時將醫病乎醫藥乎豫有一訣人以胃氣為本且與沖和之劑養其胃氣俟其胃氣稍回然後審症用藥是急脈緩受之一法若胃氣不回藥雖對症亦難受矣亦有大病初起醫家診治不差或藥料不精或服藥太少藥力未到病勢不轉病家勢必更醫接手之輩若是法家必承上文而言求所以不效之故推進一步益求其精自然對症若換一低手或貪功嫉能顛倒是非誤人性命者多矣此又在病家之信任也庸工藥誤煎劑猶可丸散更甚丸散可以藏拙庸工多用之煎劑有方在其誤易見丸散之誤何處捉摸散者散也丸者聚也古方之用散是以藥料為粗末煎服若干雖名散猶是湯也宿搏丸散相習成風愚夫愚婦多受其害豫前集已言之矣未達不敢嘗明者自曉何待豫言丸藥長於補無病而調養者宜之標病力在驅邪湯劑可以救急間亦有宜丸散者務須當面制配不以一毫隱晦存乎其間使服者坦然無疑致若懷祕方索重價非君子之道也嘗見人有疾病自謂知醫初起時自服一劑及待病進然後求醫只緣把醫道看輕了札云為人者不可不知醫俗語又云盧醫不自醫知醫者欲人知醫師之工拙非自治之謂也門外好名之輩輕舉送方本不知醫無足為怪世其業者多執成方以應變幸中之處固多而失手之處亦復不少惟願後起者能於失手之處清夜自思吾知其必有進矣豫生老山鄉見聞不廣所治驗者皆吾歙風土所生之病岐經有南北政之論風土氣候之不齊又未可以豫言概也其所同者辨症之法寒熱虛實之分病狀萬殊同歸一理故於古聖先賢卷帙之中尋出脈絡以渡金針斯則豫之苦心也又論治體張劉朱李是醫家必讀之書糊口之輩多略而不詳訒庵先生約而釋之以救時弊醫門之捷徑也準繩醫統景嶽全書辨證録等篇是病家查閲之書非行道之書也仲景方非用之難在對症之難認症既真用無不效上工善診治之準繩也東垣方有併力有加減細微曲折無不中理中工善體認之師也丹溪方首重養陰而六淫症治無不俱載但言某病用某藥並不究其所以然是為庸工糊口者開捷徑非其學之淺也河間書以亢害承製為主法遵仲景隨時審症多所發明用力最專亦稱大家但非文士之筆難於記誦人師其意而已薛立齋所治皆王公大人膏粱味厚之輩故其所用皆歸脾八珍補中益氣等方逍遙即是散劑平胃即是攻劑張子和所治多山野藜藿之輩故其所長在汗吐下三怯設以立齋方治藜藿適足以增病以子和法治膏粱三法未畢而氣已絶矣醫家讀古人書先要設身處地乃能通變
