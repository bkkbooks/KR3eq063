front:
  text: 曹序橡村痘訣一書豫既讀而序之矣橡村先生以醫名吾鄉固不特善治小兒更不特痘症豫頗疑橡村胡不盡出所學為壽世資而僅使蒙其麻者在小兒也今橡村又出書一冊曰怡堂散記分上下二卷又痘訣余議一卷豫受而讀之其書列病症詳醫方以已所臨治有驗者悉書其原委曲折各加論辨以興古相發明蓋進而上焉不獨使幼孤得遂長矣豫不知醫竊怪岐黃以降其書幾汗牛充棟學者習焉而守其法足矣胡為作者代興必各矜創穫迭擅神奇乃以成救世之效以是知理之無窮而其法隨時有異也夫靈素經書千古不易而天地氣化人生稟賦隨時為厚薄且南北異宜山川間隔一郡一鄉氣感各別即一鄉之中又隨世變轉而寒熱水旱之不齊錯出乎其中吾見今之疾不必同古之疾也又況藥物之産隨地氣變遷或同一名而古今迥殊或猶是一物而前人審驗未真久而益辨者而謂第執成言遂可自足也哉橡村博覽古書相時症之變融會變通而出之其於藥物皆細加考驗謂必使吾之精神與藥之氣味兩相融洽而後藥為我用其用力也勤其宅心也誠矣今不敢自祕將出以廣其傳吾不知此書果盡今之病症及治法與否傳之後來又有因時而變更者與否要其有益於時者固已多也又況雜採群書俾知人物之生與天地陰陽相消息推氣化之原以正性命之養尤邃然通道術之要而士君子所當深致體驗者哉板焉而試其功用吾見較前刻之大而遠也於是乎言嘉慶二年歲次丁己秋九月竹溪曹文埴拜手序目怡堂散記上卷散者無頭無緒不整不齊之謂老醫臨症數十年終日應酬不暇得心應手之處思欲記之有時研硯而客至有時執筆而飯熟於是失者十之七心之所向欲舍不能隨時記憶存於腹稿大概不在途中則在枕上此診治之散記也講習古方節録名言搜羅於寒夜是涉獵之散記也記雖不多類而推之其理不外是矣怡堂散記下卷讀古人書全在得解咽噥讀過雖多何益臨病制方要從古法不由規矩何以為工醫之為道實萬世岐黃之道所言者天下之公言非一家之私論偏執之流不以人命為重各私其學於家氣候不分寒熱不辨執守一方終身行之而不悟受其害者何可勝紀豫欲喚轉迷途不辭苦口將古人未暢之旨醒出一二啓悟後來願學者臨症推詳以求合乎先賢之治計其效驗歸之大公由是而深造逢原私心自滌矣
